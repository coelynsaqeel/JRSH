function timeLbl(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60);const period=hh>=12?"PM":"AM";const h12=hh%12||12;return String(h12).padStart(2,"0")+":"+String(mm).padStart(2,"0")+" "+period;}
function subjBg(s){const p=["#F0F4FF","#FFF0F6","#F0FFF4","#FFFBF0","#F5F0FF","#FFF5F0","#F0FFFE","#FFF0F0"];let h=0;for(const c of s)h=(h*31+c.charCodeAt(0))&0xffff;return p[h%p.length];}
function agoLabel(ts){const diff=Date.now()-new Date(ts).getTime();const m=Math.floor(diff/60000),hr=Math.floor(m/60),d=Math.floor(hr/24),w=Math.floor(d/7);if(w>0)return w+"W AGO";if(d>0)return d+"D AGO";if(hr>0)return hr+"H AGO";return"JUST NOW";}

/* ══ LESSON TIMER ══ */
function LessonTimer({lesson,C}){
  const [secs,setSecs]=useState(null);
  const [phase,setPhase]=useState("countdown");
  useEffect(()=>{
    const startMs=lesson.start_ts||Date.now();
    const endMs=startMs+(lesson.to_hour-lesson.from_hour)*3600000;
    function tick(){
      const n=Date.now();
      if(n<startMs){setSecs(Math.ceil((startMs-n)/1000));setPhase("countdown");}
      else if(n<endMs){setSecs(Math.ceil((endMs-n)/1000));setPhase("active");}
      else{setSecs(0);setPhase("ended");}
    }
    tick();
    const id=setInterval(tick,1000);
    return()=>clearInterval(id);
  },[lesson.start_ts,lesson.from_hour,lesson.to_hour]);
  if(secs===null)return null;
  const fmt=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?h+":"+String(m).padStart(2,"0")+":"+String(sc).padStart(2,"0"):String(m).padStart(2,"0")+":"+String(sc).padStart(2,"0");};
  const color=phase==="active"?"#22C55E":phase==="ended"?"#EF4444":"#F59E0B";
  const label=phase==="countdown"?"STARTS IN":phase==="active"?"ENDS IN":"ENDED";
  return(
    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4,padding:"4px 8px",borderRadius:8,background:color+"22",border:"1px solid "+color+"44"}}>
      <span style={{fontSize:11}}>{lesson.online?"🌐":"📍"}</span>
      <div style={{width:6,height:6,borderRadius:"50%",background:color,animation:phase==="active"?"pulse 1s infinite":"none"}}/>
      <span style={{fontSize:9,fontWeight:800,color,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>{label}</span>
      <span style={{fontSize:12,fontWeight:900,color,fontFamily:"'Barlow Condensed',sans-serif"}}>{phase==="ended"?"DONE":fmt(secs)}</span>
    </div>
  );
}

/* ══ OFFLINE START BUTTON ══ */
function OfflineStartButton({lesson,started,onStart,onDrop,onCancel,C}){
  const GRACE=5*60; // 5 minutes in seconds
  const [secs,setSecs]=React.useState(GRACE);
  const [phase,setPhase]=React.useState("waiting"); // waiting | live
  const startMs=lesson.start_ts||Date.now();

  React.useEffect(()=>{
    // Only show/countdown once lesson start time is reached
    const now=Date.now();
    if(now<startMs)return; // not yet time
    if(started){setPhase("live");return;}
    // Count down 5 min grace
    const remaining=Math.max(0,GRACE-Math.floor((now-startMs)/1000));
    if(remaining<=0){onDrop();return;}
    setSecs(remaining);
    const id=setInterval(()=>{
      setSecs(s=>{
        if(s<=1){clearInterval(id);onDrop();return 0;}
        return s-1;
      });
    },1000);
    return()=>clearInterval(id);
  },[started,startMs]);

  const now=Date.now();
  if(now<startMs)return null; // lesson hasn't started yet, timer shows instead

  const fmt=s=>String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");

  if(started){
    return(
      <button
        onClick={e=>{e.stopPropagation();onCancel();}}
        style={{marginTop:4,padding:"5px 12px",borderRadius:50,border:"1.5px solid #EF4444",background:"transparent",color:"#EF4444",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:10,letterSpacing:1,cursor:"pointer",alignSelf:"flex-start"}}
      >
        CANCEL LESSON
      </button>
    );
  }

  return(
    <div style={{marginTop:4,display:"flex",alignItems:"center",gap:6}}>
      <button
        onClick={e=>{e.stopPropagation();onStart();}}
        style={{padding:"5px 14px",borderRadius:50,border:"none",background:"#22C55E",color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:10,letterSpacing:1,cursor:"pointer"}}
      >
        📍 START
      </button>
      <span style={{fontSize:9,fontWeight:800,color:"#EF4444",fontFamily:"'Barlow Condensed',sans-serif"}}>
        drops in {fmt(secs)}
      </span>
    </div>
  );
}

/* ══ PDF VIEWER ══ */
function PdfViewer({note,onClose,C,initialPage,onPageChange,onRate}){
  const containerRef=React.useRef();
  const canvasRef=React.useRef();
  const [pdf,setPdf]=React.useState(null);
  const [page,setPage]=React.useState(initialPage||1);
  const [total,setTotal]=React.useState(0);
  const [loading,setLoading]=React.useState(true);
  const [err,setErr]=React.useState("");
  const [zoom,setZoom]=React.useState(1);
  const [pan,setPan]=React.useState({x:0,y:0});
  const [hoverRating,setHoverRating]=React.useState(0);
  const renderTask=React.useRef(null);
  const lastTouch=React.useRef(null);
  const lastPinchDist=React.useRef(null);
  const panStart=React.useRef(null);

  React.useEffect(()=>{
    if(!note.pdf_url)return;
    setLoading(true);setErr("");setZoom(1);setPan({x:0,y:0});
    const loadPdf=async()=>{
      try{
        if(!window.pdfjsLib){
          await new Promise((res,rej)=>{
            const s=document.createElement('script');
            s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
            s.onload=res;s.onerror=rej;document.head.appendChild(s);
          });
          window.pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }
        const pdfDoc=await window.pdfjsLib.getDocument(note.pdf_url).promise;
        setPdf(pdfDoc);setTotal(pdfDoc.numPages);setPage(1);setLoading(false);
      }catch(e){setErr("Could not load PDF.");setLoading(false);}
    };
    loadPdf();
  },[note.pdf_url]);

  React.useEffect(()=>{
    if(!pdf||!canvasRef.current||!containerRef.current)return;
    let cancelled=false;
    const render=async()=>{
      try{
        const pg=await pdf.getPage(page);
        if(cancelled)return;
        const W=containerRef.current.offsetWidth;
        const H=containerRef.current.offsetHeight;
        const baseVP=pg.getViewport({scale:1});
        // Fill container: pick scale that makes page fill width or height
        const scaleW=W/baseVP.width;
        const scaleH=H/baseVP.height;
        const baseScale=Math.max(scaleW,scaleH);
        const viewport=pg.getViewport({scale:baseScale*window.devicePixelRatio});
        const canvas=canvasRef.current;
        canvas.height=viewport.height;
        canvas.width=viewport.width;
        canvas.style.width=viewport.width/window.devicePixelRatio+"px";
        canvas.style.height=viewport.height/window.devicePixelRatio+"px";
        const ctx=canvas.getContext('2d');
        if(renderTask.current){try{renderTask.current.cancel();}catch(e){}}
        renderTask.current=pg.render({canvasContext:ctx,viewport});
        await renderTask.current.promise;
      }catch(e){}
    };
    render();
    return()=>{cancelled=true;};
  },[pdf,page]);

  // Touch handlers for pinch-zoom and pan
  function onTouchStart(e){
    if(e.touches.length===2){
      const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
      lastPinchDist.current=d;
      panStart.current=null;
    } else if(e.touches.length===1){
      panStart.current={x:e.touches[0].clientX-pan.x,y:e.touches[0].clientY-pan.y};
      lastPinchDist.current=null;
    }
  }
  function onTouchMove(e){
    e.preventDefault();
    if(e.touches.length===2&&lastPinchDist.current!=null){
      const t0=e.touches[0];const t1=e.touches[1];
      const d=Math.hypot(t0.clientX-t1.clientX,t0.clientY-t1.clientY);
      const ratio=d/lastPinchDist.current;
      lastPinchDist.current=d;
      // Zoom toward pinch midpoint
      const rect=containerRef.current.getBoundingClientRect();
      const mx=(t0.clientX+t1.clientX)/2-rect.left;
      const my=(t0.clientY+t1.clientY)/2-rect.top;
      setZoom(z=>{
        const nz=Math.min(5,Math.max(1,z*ratio));
        // Adjust pan so the focal point stays under fingers
        setPan(p=>({
          x:mx-(mx-p.x)*(nz/z),
          y:my-(my-p.y)*(nz/z)
        }));
        return nz;
      });
    } else if(e.touches.length===1&&panStart.current&&zoom>1){
      setPan({x:e.touches[0].clientX-panStart.current.x,y:e.touches[0].clientY-panStart.current.y});
    }
  }
  function onTouchEnd(){lastPinchDist.current=null;}
  function doubleTap(){setZoom(z=>z>1?1:2.5);setPan({x:0,y:0});}

  return(
    <div style={{position:"fixed",inset:0,zIndex:300,background:"#000",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{background:"#111",padding:"12px 16px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0,borderBottom:"1px solid #222"}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:15,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{note.title}</div>
          <div style={{color:"#666",fontSize:10,marginTop:1,fontFamily:"'Barlow Condensed',sans-serif"}}>{note.subject} · {note.tutor_name}{total>0?" · "+total+" pages":""}</div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:4,marginLeft:8}}>
          {[1,2,3,4,5].map(star=>(
            <button key={star} onClick={()=>onRate&&onRate(star)} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,padding:2,color:hoverRating>=star||(!hoverRating&&(note.userRating||0)>=star)?"#F59E0B":"#444",transition:"color .15s"}} onMouseEnter={()=>setHoverRating(star)} onMouseLeave={()=>setHoverRating(0)}>★</button>
          ))}
        </div>
        <button onClick={onClose} style={{marginLeft:8,background:"#222",border:"1px solid #444",borderRadius:8,padding:"8px 14px",color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer",flexShrink:0}}>✕ CLOSE</button>
      </div>
      {/* PDF canvas area — fills everything */}
      <div
        ref={containerRef}
        style={{flex:1,overflow:"hidden",position:"relative",background:"#000",display:"flex",alignItems:"center",justifyContent:"center",touchAction:"none"}}
        onTouchStart={onTouchStart}
        onTouchMove={onTouchMove}
        onTouchEnd={onTouchEnd}
        onDoubleClick={doubleTap}
      >
        {!note.pdf_url&&<div style={{display:"flex",flexDirection:"column",alignItems:"center",color:"#444"}}><div style={{fontSize:48,marginBottom:12}}>📄</div><div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:15,color:"#666"}}>NO PDF ATTACHED</div></div>}
        {note.pdf_url&&loading&&<div style={{color:"#666",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:14}}>Loading PDF…</div>}
        {note.pdf_url&&err&&<div style={{color:"#EF4444",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>{err}</div>}
        {note.pdf_url&&!loading&&!err&&(
          <div style={{transform:`scale(${zoom}) translate(${pan.x/zoom}px,${pan.y/zoom}px)`,transformOrigin:"center center",transition:lastPinchDist.current?"none":"transform .1s",willChange:"transform",display:"flex",alignItems:"center",justifyContent:"center",width:"100%",height:"100%"}}>
            <canvas ref={canvasRef} style={{display:"block",maxWidth:"100%",maxHeight:"100%"}}/>
          </div>
        )}
        {zoom>1&&<div style={{position:"absolute",top:10,right:10,background:"rgba(0,0,0,.5)",borderRadius:8,padding:"3px 10px",color:"#fff",fontSize:10,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,pointerEvents:"none"}}>{Math.round(zoom*100)}%</div>}
        {!loading&&!err&&total>0&&<div style={{position:"absolute",bottom:10,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,.55)",borderRadius:20,padding:"4px 14px",color:"#fff",fontSize:11,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,pointerEvents:"none"}}>{page} / {total}</div>}
      </div>
      {/* Nav bar */}
      {total>1&&!loading&&!err&&(
        <div style={{background:"#111",padding:"10px 16px",display:"flex",alignItems:"center",justifyContent:"center",gap:16,flexShrink:0,borderTop:"1px solid #222"}}>
          <button onClick={()=>{const np=Math.max(1,page-1);setPage(np);setZoom(1);setPan({x:0,y:0});if(onPageChange)onPageChange(np);}} disabled={page===1} style={{background:"#222",border:"1px solid "+(page===1?"#333":"#555"),borderRadius:8,padding:"9px 20px",color:page===1?"#444":"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,cursor:page===1?"default":"pointer"}}>‹ PREV</button>
          <span style={{color:"#888",fontFamily:"'Barlow Condensed',sans-serif",fontSize:12,fontWeight:700,minWidth:50,textAlign:"center"}}>{page} / {total}</span>
          <button onClick={()=>{const np=Math.min(total,page+1);setPage(np);setZoom(1);setPan({x:0,y:0});if(onPageChange)onPageChange(np);}} disabled={page===total} style={{background:"#222",border:"1px solid "+(page===total?"#333":"#555"),borderRadius:8,padding:"9px 20px",color:page===total?"#444":"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,cursor:page===total?"default":"pointer"}}>NEXT ›</button>
        </div>
      )}
    </div>
  );
}

/* ══ CUSTOM PICKER ══ */
function Picker({value,onChange,items,placeholder="Choose…",C,mb=14}){
  const [open,setOpen]=useState(false);
  const norm=items.map(i=>typeof i==="string"?{label:i,value:i}:i);
  const chosen=norm.find(i=>i.value===value);
  return(
    <div style={{position:"relative",marginBottom:mb,zIndex:open?500:1}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",borderRadius:14,border:"1.5px solid "+(open?C.text:C.border),background:C.surfaceAlt,cursor:"pointer",userSelect:"none"}}>
        <span style={{fontSize:14,color:chosen?C.text:C.sub,fontFamily:"Barlow,sans-serif"}}>{chosen?chosen.label:placeholder}</span>
        <span style={{fontSize:11,color:C.sub,transform:open?"rotate(180deg)":"none",transition:"transform .15s"}}>▾</span>

/* ══ STUDENT APP ══ */
function StudentApp({user,onLogout}){
  const isSample=user.id&&user.id.startsWith("sample-");
  const [dm,setDm]=useState(false);
  const C=dm?dC():lC();
  const [tab,setTab]=useState("timetable");
  const [lessons,setLessons]=useState(isSample?SAMPLE_LESSONS_STUDENT:[]);
  const [loadingL,setLoadingL]=useState(!isSample);
  const [acceptedMap,setAcceptedMap]=useState(isSample?{"sl1":true,"sl3":true,"sl5":true,"sl8":true}:{});
  const [showAdd,setShowAdd]=useState(false);
  const [showManage,setShowManage]=useState(false);
  const [showHistory,setShowHistory]=useState(false);
  const [lessonHistory,setLessonHistory]=useState(isSample?SAMPLE_HISTORY_STUDENT:[]);
  const [showTutorProfile,setShowTutorProfile]=React.useState(null); // {tutor, lesson}
  const [showTutorProfileLesson,setShowTutorProfileLesson]=React.useState(null);
  const [showTutors,setShowTutors]=useState(null);
  const [editLesson,setEditLesson]=useState(null);
  const [requested,setRequested]=useState(new Set());
  const [addForm,setAddForm]=useState({subject:"",day:"MON",from:8,to:9,desc:"",online:false});
  const [addErr,setAddErr]=useState("");
  const [saving,setSaving]=useState(false);
  const [tutors,setTutors]=useState(isSample?SAMPLE_TUTORS:[]);
  const [notes,setNotes]=useState(isSample?SAMPLE_NOTES:[]);
  const [loadingN,setLoadingN]=useState(!isSample);
  const [archFilter,setArchFilter]=useState("ALL");
  const [archSearch,setArchSearch]=useState("");
  const [interactions,setInteractions]=useState({});
  const [profile,setProfile]=useState(user);
  const [profEdit,setProfEdit]=useState(false);
  const [editP,setEditP]=useState({...user});
  const [profSaving,setProfSaving]=useState(false);
  const [openNote,setOpenNote]=useState(null);
  const [notePages,setNotePages]=useState({});
  const [cancelLesson,setCancelLesson]=useState(null);
  const [offlineStarted,setOfflineStarted]=useState({}); // lessonId -> true when student pressed START
  const [offlineDropped,setOfflineDropped]=useState(new Set()); // lessonId -> dropped
  const [callLesson,setCallLesson]=useState(null);
  const pfpRef=useRef();

  // Fetch data for real users
  useEffect(()=>{
    if(isSample)return;
    (async()=>{
      setLoadingL(true);
      try{
        const data=await sb.get("lessons","?student_id=eq."+user.id+"&order=from_hour.asc");
        setLessons(data);
        const reqs=await sb.get("tutor_requests","?student_id=eq."+user.id+"&status=eq.accepted");
        const m={};reqs.forEach(r=>{m[r.lesson_id]=true;});
        setAcceptedMap(m);
      }catch(e){}finally{setLoadingL(false);}
    })();
  },[isSample,user.id]);
  useEffect(()=>{
    if(isSample)return;
    (async()=>{
      setLoadingN(true);
      try{
        const [n,ix]=await Promise.all([sb.get("notes","?order=created_at.desc"),sb.get("note_interactions","?user_id=eq."+user.id)]);
        setNotes(n.length?n:SAMPLE_NOTES);
        const map={};ix.forEach(i=>{map[i.note_id]={liked:i.liked,saved:i.saved,id:i.id};});
        setInteractions(map);
      }catch(e){setNotes(SAMPLE_NOTES);}finally{setLoadingN(false);}
    })();
    (async()=>{
      try{const data=await sb.get("profiles","?role=eq.tutor&select=id,name,age,gender,location,hourly_rate_online,hourly_rate_offline,curriculum_level,subjects_taught");setTutors(data.length?data:SAMPLE_TUTORS);}catch(e){setTutors(SAMPLE_TUTORS);}
    })();
  },[isSample,user.id]);

  // Trigger call when accepted lesson starts
  useEffect(()=>{
    const interval=setInterval(()=>{
      const now=Date.now();
      lessons.forEach(l=>{
        if(!acceptedMap[l.id]||!l.start_ts)return;
        const diff=now-l.start_ts;
        if(diff>=0&&diff<30000&&callLesson?.id!==l.id){setCallLesson(l);}
      });
    },5000);
    return()=>clearInterval(interval);
  },[lessons,acceptedMap,callLesson]);

  function hasOverlap(day,from,to,excludeId){
    return lessons.some(l=>{
      if(l.day!==day)return false;
      if(excludeId&&l.id===excludeId)return false;
      // Overlap if one starts before the other ends
      return from<l.to_hour&&to>l.from_hour;
    });
  }
  async function handleAddLesson(){
    if(!addForm.subject||saving)return;
    setAddErr("");
    if(addForm.from>=addForm.to){setAddErr("Start time must be before end time.");return;}
    if(hasOverlap(addForm.day,addForm.from,addForm.to)){
      const clashing=lessons.filter(l=>l.day===addForm.day&&addForm.from<l.to_hour&&addForm.to>l.from_hour);
      const names=clashing.map(l=>l.subject).join(", ");
      setAddErr("This slot overlaps with: "+names+". Please choose a different time.");
      return;
    }
    setSaving(true);
    try{
      if(isSample){
        const fake={id:"local-"+Date.now(),student_id:user.id,subject:addForm.subject,day:addForm.day,from_hour:addForm.from,to_hour:addForm.to,description:addForm.desc,online:addForm.online,start_ts:null};
        setLessons(l=>[...l,fake]);
      }else{
        const [lesson]=await sb.post("lessons",{student_id:user.id,subject:addForm.subject,day:addForm.day,from_hour:addForm.from,to_hour:addForm.to,description:addForm.desc,online:addForm.online});
        setLessons(l=>[...l,lesson]);
      }
      setShowAdd(false);setAddForm({subject:"",day:"MON",from:8,to:9,desc:"",online:false});setAddErr("");
    }catch(e){}finally{setSaving(false);}
  }

  async function handleDeleteLesson(id){
    if(isSample){setLessons(l=>l.filter(x=>x.id!==id));return;}
    try{await sb.del("lessons","?id=eq."+id);setLessons(l=>l.filter(x=>x.id!==id));}catch(e){}
  }

  async function handleSaveEdit(){
    if(!editLesson||saving)return;setSaving(true);
    try{
      if(!isSample)await sb.patch("lessons","?id=eq."+editLesson.id,{subject:editLesson.subject,day:editLesson.day,from_hour:editLesson.from_hour,to_hour:editLesson.to_hour,description:editLesson.description,online:editLesson.online});
      setLessons(l=>l.map(x=>x.id===editLesson.id?{...x,...editLesson}:x));setEditLesson(null);
    }catch(e){}finally{setSaving(false);}
  }

  async function handleRequestTutor(tutor,lesson){
    const key=tutor.id+"-"+lesson.id;
    if(requested.has(key))return;
    setRequested(s=>new Set([...s,key]));
    // Mark lesson orange (pending) and store tutor info
    setLessons(ls=>ls.map(l=>l.id===lesson.id?{...l,_pending:true,_accepted:false,_tutorName:tutor.name,_tutorId:tutor.id,_tutorObj:tutor}:l));
    setShowTutors(null); // close modal
    if(!isSample){try{await sb.post("tutor_requests",{lesson_id:lesson.id,student_id:user.id,tutor_id:tutor.id,subject:lesson.subject,day:lesson.day,from_hour:lesson.from_hour,to_hour:lesson.to_hour,online:lesson.online,description:lesson.description,student_name:user.name,status:"pending"});}catch(e){}}
  }

  async function handleInteraction(noteId,field){
    const cur=interactions[noteId]||{liked:false,saved:false};
    const next={...cur,[field]:!cur[field]};
    setInteractions(i=>({...i,[noteId]:next}));
    if(isSample)return;
    try{
      if(cur.id){await sb.patch("note_interactions","?id=eq."+cur.id,{[field]:next[field]});}
      else{const [row]=await sb.post("note_interactions",{note_id:noteId,user_id:user.id,...next});setInteractions(i=>({...i,[noteId]:{...next,id:row.id}}));}
    }catch(e){setInteractions(i=>({...i,[noteId]:cur}));}
  }

  async function handleCancelSession(lesson,type){
    setCancelLesson(null);
    if(!isSample){
      try{await sb.patch("tutor_requests","?lesson_id=eq."+lesson.id,{status:"cancelled"});}catch(e){}
    }
    handleDeleteLesson(lesson.id);
  }

  async function handleSaveProfile(){
    setProfSaving(true);
    try{
      if(!isSample)await sb.patch("profiles","?id=eq."+user.id,{name:editP.name,age:editP.age?+editP.age:null,gender:editP.gender,location:editP.location,grade:editP.grade});
      setProfile({...profile,...editP});setProfEdit(false);
    }catch(e){}finally{setProfSaving(false);}
  }

  const studentLevel=gradeToLevel(user.grade||profile.grade);
  const getLessonsForDay=d=>lessons.filter(l=>l.day===d).sort((a,b)=>a.from_hour-b.from_hour);
  const getMatchingTutors=lesson=>{
    const exact=tutors.filter(t=>{
      const levelMatch=t.curriculum_level===studentLevel;
      const subjectMatch=t.subjects_taught&&t.subjects_taught.includes(lesson.subject);
      return levelMatch&&subjectMatch;
    });
    // In sample/demo mode or when no exact match, show all tutors who teach the subject,
    // then fall back to all tutors so the UI is never empty
    if(exact.length>0)return exact;
    const subjectOnly=tutors.filter(t=>t.subjects_taught&&t.subjects_taught.includes(lesson.subject));
    return subjectOnly.length>0?subjectOnly:tutors;
  };
  const filteredNotes=()=>{
    let n=notes.map(note=>({...note,...(interactions[note.id]||{liked:false,saved:false})}));
    if(archFilter==="FAVORITES")n=n.filter(x=>x.liked);
    if(archFilter==="SAVED")n=n.filter(x=>x.saved);
    if(archSearch)n=n.filter(x=>x.title?.toLowerCase().includes(archSearch.toLowerCase())||x.subject?.toLowerCase().includes(archSearch.toLowerCase()));
    return n;
  };

  return(
    <Shell C={C}>
      {openNote&&<PdfViewer note={openNote} onClose={()=>setOpenNote(null)} C={C} initialPage={notePages[openNote.id]||1} onPageChange={p=>setNotePages(pp=>({...pp,[openNote.id]:p}))} onRate={r=>{setNotes(ns=>ns.map(n=>n.id===openNote.id?{...n,userRating:r}:n));setOpenNote(o=>o?{...o,userRating:r}:o);}}/>}
      {callLesson&&<CallDialog lesson={callLesson} onEnd={(reason)=>{
        if(callLesson.online||reason==="ended"||reason==="timeout"){
          setLessons(ls=>ls.filter(l=>l.id!==callLesson.id));
          setAcceptedMap(m=>{const n={...m};delete n[callLesson.id];return n;});
        }
        setCallLesson(null);
      }} C={C}/>}
      {cancelLesson&&<CancelModal onCancel={t=>handleCancelSession(cancelLesson,t)} onClose={()=>setCancelLesson(null)} C={C}/>}

      {tab==="timetable"&&<>
        <Hdr C={C} dm={dm}><PBtn outline C={C} onClick={()=>setShowManage(true)}>MANAGE</PBtn><PBtn C={C} onClick={()=>setShowAdd(true)}>ADD SLOT</PBtn></Hdr>
        <Scroll>
          {loadingL?<Ldg C={C}/>:
            <DayGrid days={DAYS} getLessons={getLessonsForDay} C={C} onTap={l=>{if(l._tutorObj&&(l._pending||l._accepted||acceptedMap[l.id])){setShowTutorProfile(l._tutorObj);setShowTutorProfileLesson(l);}else{setShowTutors(l);}}}
              renderExtra={l=>{
                const isPending=l._pending&&!l._accepted&&!acceptedMap[l.id];
                const isAccepted=l._accepted||acceptedMap[l.id];
                if(!isPending&&!isAccepted)return null;
                const tutorName=l._tutorName||null;
                const startStr=l.start_ts?new Date(l.start_ts).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):timeLbl(l.from_hour);
                const endMs=l.start_ts?(l.start_ts+(l.to_hour-l.from_hour)*3600000):null;
                const endStr=endMs?new Date(endMs).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"}):timeLbl(l.to_hour);
                const isOffline=!l.online;
                const started=offlineStarted[l.id];
                const dropped=offlineDropped.has(l.id);
                return(
                  <div style={{marginTop:3,display:"flex",flexDirection:"column",gap:2}}>
                    {isPending&&<div style={{fontSize:9,fontWeight:800,color:"#E65100",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:.5}}>⏳ Awaiting {tutorName||"tutor"}</div>}
                    {isAccepted&&tutorName&&<div style={{fontSize:9,fontWeight:800,color:"#166634",fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:.5}}>✓ {tutorName}</div>}
                    {isAccepted&&<div style={{fontSize:9,fontWeight:700,color:"#555",fontFamily:"'Barlow Condensed',sans-serif"}}>🕐 {startStr} → {endStr}</div>}
                    {isAccepted&&<LessonTimer lesson={l} C={C}/>}
                    {isAccepted&&isOffline&&!dropped&&(
                      <OfflineStartButton
                        lesson={l}
                        started={started}
                        onStart={()=>{
                          setOfflineStarted(s=>({...s,[l.id]:true}));
                          try{const cur=JSON.parse(localStorage.getItem("jrsh_offline_started")||"[]");if(!cur.includes(l.id)){localStorage.setItem("jrsh_offline_started",JSON.stringify([...cur,l.id]));}}catch(e){}
                        }}
                        onDrop={()=>{
                          setOfflineDropped(s=>{const n=new Set(s);n.add(l.id);return n;});
                          setLessons(ls=>ls.filter(x=>x.id!==l.id));
                        }}
                        onCancel={()=>setCancelLesson(l)}
                        C={C}
                      />
                    )}
                    {dropped&&<div style={{fontSize:9,fontWeight:800,color:"#EF4444",fontFamily:"'Barlow Condensed',sans-serif"}}>⚠ Lesson dropped — tutor didn't arrive</div>}
                  </div>
                );
              }}/>
          }
        </Scroll>
      </>}

      {tab==="archive"&&<>
        <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"10px 16px",minHeight:52,background:C.surface,borderBottom:"1px solid "+C.border,flexShrink:0}}><Logo dm={dm}/></div>
        <Scroll>
          <ArchSearch value={archSearch} onChange={setArchSearch} C={C}/>
          <FilterRow value={archFilter} onChange={setArchFilter} C={C}/>
          {loadingN?<Ldg C={C}/>:<NoteGrid notes={filteredNotes()} C={C} onLike={id=>handleInteraction(id,"liked")} onSave={id=>handleInteraction(id,"saved")} onOpen={setOpenNote}/>}
        </Scroll>
      </>}

      {tab==="identity"&&<>
        <IdentHdr C={C} dm={dm} setDm={setDm}/>
        <Scroll>
          <ProfCard profile={profile} editP={editP} setEditP={setEditP} editing={profEdit} pfpRef={pfpRef} C={C}/>
          <input type="file" accept="image/*" ref={pfpRef} style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setEditP(p=>({...p,pfp_local:ev.target.result}));r.readAsDataURL(f);}}/>
          <ConfCard C={C} editP={editP} setEditP={setEditP} editing={profEdit} profile={profile} isStudent
            onToggle={()=>{if(profEdit)handleSaveProfile();else{setEditP({...profile});setProfEdit(true);}}} saving={profSaving} onLogout={onLogout}/>
          <div style={{height:24}}/>
        </Scroll>
      </>}

      <BotNav tab={tab} setTab={setTab} C={C}/>

      {showAdd&&<Modal onClose={()=>setShowAdd(false)} C={C}>
        <MT>📅 New Session</MT><MS C={C}>Configure the slot.</MS>
        <ML C={C}>SUBJECT</ML><Picker value={addForm.subject} onChange={v=>setAddForm(f=>({...f,subject:v}))} items={SUBJECTS} placeholder="Select Subject" C={C}/>
        <ML C={C}>DAY</ML><Picker value={addForm.day} onChange={v=>setAddForm(f=>({...f,day:v}))} items={DAYS.map((d,i)=>({label:d+" – "+DAY_FULL[i],value:d}))} placeholder="Select Day" C={C}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
          <TimePicker label="FROM" value={addForm.from} onChange={v=>setAddForm(f=>({...f,from:v}))} C={C}/>
          <TimePicker label="TO" value={addForm.to} onChange={v=>setAddForm(f=>({...f,to:v}))} C={C}/>
        </div>
        <ML C={C}>NOTE FOR TUTOR</ML>

        <ML C={C}>MODE</ML>
        <ModeRow online={addForm.online} C={C} setOnline={v=>setAddForm(f=>({...f,online:v}))}/>

      {showHistory&&<HistoryModal history={lessonHistory} onClose={()=>setShowHistory(false)} C={C} isStudent/>}
      {showManage&&<Modal onClose={()=>{setShowManage(false);setEditLesson(null);}} C={C}>
        {editLesson?(
          <>
            <MT>✏️ Edit Session</MT><MS C={C}>Modify details.</MS>
            <ML C={C}>SUBJECT</ML><Picker value={editLesson.subject} onChange={v=>setEditLesson(l=>({...l,subject:v}))} items={SUBJECTS} placeholder="Select" C={C}/>
            <ML C={C}>DAY</ML><Picker value={editLesson.day} onChange={v=>setEditLesson(l=>({...l,day:v}))} items={DAYS.map((d,i)=>({label:d+" – "+DAY_FULL[i],value:d}))} placeholder="Day" C={C}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:14}}>
              <TimePicker label="FROM" value={editLesson.from_hour} onChange={v=>setEditLesson(l=>({...l,from_hour:v}))} C={C}/>
              <TimePicker label="TO" value={editLesson.to_hour} onChange={v=>setEditLesson(l=>({...l,to_hour:v}))} C={C}/>
            </div>
            <ML C={C}>MODE</ML><ModeRow online={editLesson.online} C={C} setOnline={v=>setEditLesson(l=>({...l,online:v}))}/>
            <SvBtn C={C} onClick={handleSaveEdit} loading={saving}>✓ SAVE</SvBtn>
            <CnBtn C={C} onClick={()=>setEditLesson(null)}>← BACK</CnBtn>
          </>
        ):(
          <>
            <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:4}}>
              <div><MT>⚙️ Manage Slots</MT><MS C={C}>{lessons.length} lesson{lessons.length!==1?"s":""} scheduled</MS></div>
              <button onClick={()=>setShowHistory(true)} style={{padding:"7px 14px",borderRadius:50,border:"1.5px solid "+C.border,background:"transparent",color:C.text,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,letterSpacing:1,cursor:"pointer",flexShrink:0,marginTop:2}}>📋 HISTORY</button>
            </div>
            {lessons.length===0&&<Empty C={C}>NO LESSONS YET</Empty>}
            {lessons.map(l=>(
              <div key={l.id} style={{background:subjBg(l.subject),borderRadius:14,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:14,color:"#111"}}>{l.subject}</div>
                  <div style={{fontSize:11,color:"#555",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginTop:2}}>{l.day} · {timeLbl(l.from_hour)}–{timeLbl(l.to_hour)}</div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setEditLesson({...l})} style={{background:"#fff",border:"1px solid #ddd",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,color:"#111"}}>EDIT</button>
                  <button onClick={()=>handleDeleteLesson(l.id)} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,color:"#DC2626"}}>DEL</button>
                </div>
              </div>
            ))}
            <CnBtn C={C} onClick={()=>setShowManage(false)}>CLOSE</CnBtn>
          </>
        )}
      </Modal>}

      {showTutorProfile&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)setShowTutorProfile(null);}}>
          <div style={{background:C.surface,borderRadius:"24px 24px 0 0",width:"100%",maxWidth:430,padding:"24px 22px 36px",maxHeight:"88vh",overflowY:"auto"}}>
            <div style={{display:"flex",alignItems:"center",gap:14,marginBottom:18}}>
              <div style={{width:60,height:60,borderRadius:"50%",background:C.accentBg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:24,color:C.accentText}}>{showTutorProfile.name?showTutorProfile.name[0].toUpperCase():"?"}</span>
              </div>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:20,color:C.text}}>{showTutorProfile.name}</div>
                <div style={{fontSize:11,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginTop:2}}>{showTutorProfile.curriculum_level}</div>
              </div>
              {showTutorProfileLesson&&showTutorProfileLesson._accepted&&<a href={"tel:"+(showTutorProfile.phone||"")} style={{width:44,height:44,borderRadius:"50%",background:"#22C55E",border:"none",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",textDecoration:"none",flexShrink:0}}>
                <span style={{fontSize:20}}>📞</span>
              </a>}
            </div>
            {[
              {label:"MODE",value:showTutorProfile.online?"🌐 Online":"📍 Offline"},
              {label:"LEVEL",value:showTutorProfile.curriculum_level},
              showTutorProfile.age&&{label:"AGE",value:showTutorProfile.age+" yrs"},
              showTutorProfile.gender&&{label:"GENDER",value:showTutorProfile.gender},
              showTutorProfile.location&&{label:"ZONE",value:showTutorProfile.location},
              showTutorProfile.hourly_rate_online&&{label:"ONLINE RATE",value:"KES "+showTutorProfile.hourly_rate_online+"/hr"},
              showTutorProfile.hourly_rate_offline&&{label:"OFFLINE RATE",value:"KES "+showTutorProfile.hourly_rate_offline+"/hr"},
            ].filter(Boolean).map(row=>(
              <div key={row.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid "+C.border}}>
                <span style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif"}}>{row.label}</span>
                <span style={{fontSize:13,fontWeight:700,color:C.text,fontFamily:"'Barlow Condensed',sans-serif"}}>{row.value}</span>
              </div>
            ))}
            {showTutorProfile.subjects_taught&&(
              <div style={{marginTop:14,padding:12,borderRadius:12,background:C.surfaceAlt,border:"1px solid "+C.border}}>
                <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:8}}>SUBJECTS</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{showTutorProfile.subjects_taught.map(s=><span key={s} style={{fontSize:10,fontWeight:800,padding:"3px 10px",borderRadius:20,background:"#111",color:"#fff",fontFamily:"'Barlow Condensed',sans-serif"}}>{s}</span>)}</div>
              </div>
            )}
            <button onClick={()=>setShowTutorProfile(null)} style={{marginTop:18,width:"100%",padding:"13px",borderRadius:50,border:"1.5px solid "+C.border,background:"transparent",color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,cursor:"pointer"}}>CLOSE</button>
          </div>
        </div>
      )}
      {showTutors&&<Modal onClose={()=>setShowTutors(null)} C={C}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4}}>
          <span style={{fontSize:20}}>{showTutors.online?"🌐":"📍"}</span>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,color:C.text}}>{showTutors.subject}</div>
            <div style={{fontSize:11,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>{showTutors.day} · {timeLbl(showTutors.from_hour)}–{timeLbl(showTutors.to_hour)} · {showTutors.online?"Online":"Offline"}</div>
          </div>
        </div>
        <div style={{fontSize:10,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1,marginBottom:14,paddingBottom:12,borderBottom:"1px solid "+C.border}}>AVAILABLE TUTORS</div>
        {getMatchingTutors(showTutors).length===0&&<Empty C={C}>NO TUTORS AVAILABLE YET</Empty>}
        {getMatchingTutors(showTutors).map(tutor=>{
          const key=tutor.id+"-"+showTutors.id;
          const done=requested.has(key);
          const rate=showTutors.online?tutor.hourly_rate_online:tutor.hourly_rate_offline;
          const initials=(tutor.name||"?").split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
          return(
            <div key={tutor.id} style={{background:C.surfaceAlt,borderRadius:16,padding:"14px 14px",marginBottom:10,border:"1px solid "+C.border}}>
              <div style={{display:"flex",alignItems:"flex-start",gap:12}}>
                {/* Avatar */}
                <div style={{width:48,height:48,borderRadius:"50%",background:C.accentBg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                  <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:16,color:C.accentText}}>{initials}</span>
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:15,color:C.text}}>{tutor.name}</div>
                  <div style={{fontSize:11,color:C.sub,marginTop:1,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>{[tutor.age&&tutor.age+" yrs",tutor.gender,tutor.location].filter(Boolean).join(" · ")}</div>
                  <div style={{fontSize:10,color:C.sub,marginTop:4,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:.5}}>{tutor.curriculum_level}</div>
                  {tutor.subjects_taught&&<div style={{display:"flex",flexWrap:"wrap",gap:4,marginTop:6}}>{tutor.subjects_taught.map(s=><span key={s} style={{fontSize:9,fontWeight:800,padding:"2px 7px",borderRadius:20,background:s===showTutors.subject?"#111":"rgba(0,0,0,.07)",color:s===showTutors.subject?"#fff":"#555",fontFamily:"'Barlow Condensed',sans-serif"}}>{s}</span>)}</div>}
                  {rate&&<div style={{fontSize:13,fontWeight:900,color:"#16a34a",marginTop:8,fontFamily:"'Barlow Condensed',sans-serif"}}>KES {rate.toLocaleString()}/hr</div>}
                </div>
              </div>
              <button onClick={()=>handleRequestTutor(tutor,showTutors)} style={{marginTop:12,width:"100%",padding:"11px",borderRadius:50,cursor:"pointer",border:"none",background:done?"#22C55E":"#111",color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,letterSpacing:1.5}}>
                {done?"✓ REQUEST SENT":"REQUEST THIS TUTOR →"}
              </button>
            </div>
          );
        })}
        <CnBtn C={C} onClick={()=>setShowTutors(null)}>CLOSE</CnBtn>
      </Modal>}
    </Shell>
  );
}

/* ══ TUTOR APP ══ */
function TutorApp({user,onLogout}){
  const isSample=user.id&&user.id.startsWith("sample-");
  const [dm,setDm]=useState(false);
  const C=dm?dC():lC();
  const [tab,setTab]=useState("timetable");
  const [requests,setRequests]=useState(isSample?SAMPLE_LESSONS_TUTOR:[]);
  const [loadingR,setLoadingR]=useState(!isSample);
  const [showManage,setShowManage]=useState(false);
  const [showHistory,setShowHistory]=useState(false);
  const [lessonHistory,setLessonHistory]=useState(isSample?SAMPLE_HISTORY_TUTOR:[]);
  const [showMode,setShowMode]=useState("requests"); // "requests" | "manage"
  const [showReq,setShowReq]=useState(null);
  const [reqSaving,setReqSaving]=useState(false);
  const [notes,setNotes]=useState(isSample?SAMPLE_NOTES:[]);
  const [loadingN,setLoadingN]=useState(!isSample);
  const [archFilter,setArchFilter]=useState("ALL");
  const [archSearch,setArchSearch]=useState("");
  const [interactions,setInteractions]=useState({});
  const [showPublish,setShowPublish]=useState(false);
  const [showCoverEdit,setShowCoverEdit]=useState(false);
  const [pubForm,setPubForm]=useState({title:"",subject:"",file:null,coverPreview:null,coverFile:null});
  const [publishing,setPublishing]=useState(false);
  const [profile,setProfile]=useState(user);
  const [showStudentProf,setShowStudentProf]=React.useState(null);
  const [showWallet,setShowWallet]=React.useState(false);
  const [walletBal,setWalletBal]=React.useState(isSample?4750:0);
  const [walletTx,setWalletTx]=React.useState(isSample?[
    {id:1,label:"Amara – Mathematics",amount:300,type:"credit",date:"Today, 09:00"},
    {id:2,label:"Kofi – Biology (offline)",amount:500,type:"credit",date:"Yesterday, 14:00"},
    {id:3,label:"Withdrawal",amount:-2000,type:"debit",date:"Mon, 10:30"},
    {id:4,label:"John – Physics",amount:300,type:"credit",date:"Mon, 08:00"},
    {id:5,label:"Grace – Chemistry",amount:450,type:"credit",date:"Sun, 15:00"},
    {id:6,label:"Withdrawal",amount:-800,type:"debit",date:"Fri, 11:00"},
  ]:[]);
  const [withdrawAmt,setWithdrawAmt]=React.useState("");
  const [withdrawMsg,setWithdrawMsg]=React.useState("");
  function doWithdraw(){
    const amt=parseFloat(withdrawAmt);
    if(!amt||amt<=0){setWithdrawMsg("Enter a valid amount.");return;}
    if(amt>walletBal){setWithdrawMsg("Insufficient balance.");return;}
    setWalletBal(b=>b-amt);
    setWalletTx(tx=>[{id:Date.now(),label:"Withdrawal",amount:-amt,type:"debit",date:"Just now"},...tx]);
    setWithdrawAmt("");setWithdrawMsg("✓ Withdrawal requested!");
    setTimeout(()=>setWithdrawMsg(""),3000);
  }
  const [profEdit,setProfEdit]=useState(false);
  const [editP,setEditP]=useState({...user});
  const [profSaving,setProfSaving]=useState(false);
  const [openNote,setOpenNote]=useState(null);
  const [notePages,setNotePages]=useState({});
  const [editingNote,setEditingNote]=useState(null);
  const [showNoteEditCover,setShowNoteEditCover]=useState(false);
  const editCoverRef=React.useRef();
  const editPdfRef=React.useRef();
  const [callLesson,setCallLesson]=useState(null);
  const [cancelReq,setCancelReq]=useState(null);
  const [offlineStartedIds,setOfflineStartedIds]=useState(new Set()); // lessons student has started
  React.useEffect(()=>{
    function checkStarted(){
      try{const ids=JSON.parse(localStorage.getItem("jrsh_offline_started")||"[]");setOfflineStartedIds(new Set(ids));}catch(e){}
    }
    checkStarted();
    const id=setInterval(checkStarted,3000);
    return()=>clearInterval(id);
  },[]);
  const pfpRef=useRef();
  const pdfRef=useRef();
  const coverRef=useRef();

  useEffect(()=>{
    if(isSample)return;
    (async()=>{
      setLoadingR(true);
      try{const data=await sb.get("tutor_requests","?tutor_id=eq."+user.id+"&order=created_at.desc");setRequests(data);}
      catch(e){}finally{setLoadingR(false);}
    })();
    (async()=>{
      setLoadingN(true);
      try{
        const [n,ix]=await Promise.all([sb.get("notes","?order=created_at.desc"),sb.get("note_interactions","?user_id=eq."+user.id)]);
        setNotes(n.length?n:SAMPLE_NOTES);
        const map={};ix.forEach(i=>{map[i.note_id]={liked:i.liked,saved:i.saved,id:i.id};});
        setInteractions(map);
      }catch(e){setNotes(SAMPLE_NOTES);}finally{setLoadingN(false);}
    })();
  },[isSample,user.id]);

  // Trigger call when accepted lesson starts
  useEffect(()=>{
    const booked=requests.filter(r=>r.status==="accepted");
    const interval=setInterval(()=>{
      const now=Date.now();
      booked.forEach(l=>{
        if(!l.start_ts)return;
        const diff=now-l.start_ts;
        if(diff>=0&&diff<30000&&callLesson?.id!==l.id){setCallLesson(l);}
      });
    },5000);
    return()=>clearInterval(interval);
  },[requests,callLesson]);

  const booked=requests.filter(r=>r.status==="accepted");
  const pending=requests.filter(r=>r.status==="pending");
  const getLessonsForDay=d=>booked.filter(l=>l.day===d).sort((a,b)=>a.from_hour-b.from_hour);

  async function handleRespond(reqId,status){
    if(reqSaving)return;
    const req=requests.find(r=>r.id===reqId);
    if(!req)return;
    // Overlap check on accept
    if(status==="accepted"){
      const clash=booked.find(l=>
        l.id!==reqId&&
        l.day===req.day&&
        req.from_hour<l.to_hour&&
        req.to_hour>l.from_hour
      );
      if(clash){
        alert(`Cannot accept — this overlaps with ${clash.subject} (${timeLbl(clash.from_hour)}–${timeLbl(clash.to_hour)}) on ${clash.day}. Decline this request or cancel the other session first.`);
        return;
      }
    }
    setReqSaving(true);
    try{
      if(!isSample)await sb.patch("tutor_requests","?id=eq."+reqId,{status});
      if(status==="declined"){
        // Remove declined requests from the list entirely
        setRequests(r=>r.filter(x=>x.id!==reqId));
      }else{
        setRequests(r=>r.map(x=>x.id===reqId?{...x,status}:x));
      }
      setShowReq(null);
    }catch(e){}finally{setReqSaving(false);}
  }

  async function handleCancelBooked(req,type){
    setCancelReq(null);
    if(!isSample){try{await sb.patch("tutor_requests","?id=eq."+req.id,{status:"cancelled"});}catch(e){}}
    setRequests(r=>r.map(x=>x.id===req.id?{...x,status:"cancelled"}:x));
  }

  async function handlePublish(){
    if(!pubForm.title||!pubForm.subject||publishing)return;
    setPublishing(true);
    try{
      const color=COVER_COLORS[Math.floor(Math.random()*COVER_COLORS.length)];
      const noteData={id:"local-"+Date.now(),title:pubForm.title.toUpperCase(),subject:pubForm.subject,tutor_name:profile.name,created_at:new Date().toISOString(),rating:0,cover_url:pubForm.coverPreview||null,cover_color:color,pdf_url:pubForm.pdfDataUrl||null,cover_pos:pubForm.coverPos||{x:50,y:50}};

      setPubForm({title:"",subject:"",file:null,coverPreview:null,coverFile:null,pdfDataUrl:null,coverPos:null});setShowPublish(false);

  async function handleInteraction(noteId,field){
    const cur=interactions[noteId]||{liked:false,saved:false};
    const next={...cur,[field]:!cur[field]};
    setInteractions(i=>({...i,[noteId]:next}));
    if(isSample)return;
    try{
      if(cur.id){await sb.patch("note_interactions","?id=eq."+cur.id,{[field]:next[field]});}
      else{const [row]=await sb.post("note_interactions",{note_id:noteId,user_id:user.id,...next});setInteractions(i=>({...i,[noteId]:{...next,id:row.id}}));}
    }catch(e){setInteractions(i=>({...i,[noteId]:cur}));}
  }

    setProfSaving(true);

          <ConfCard C={C} editP={editP} setEditP={setEditP} editing={profEdit} profile={profile} isTutor

function CoverEditPage({src,pos,onSave,onChangeCover,onClose,noteTitle,noteSubject,C}){
  const [curPos,setCurPos]=React.useState(pos);
  const imgRef=React.useRef();
  const dragging=React.useRef(false);
  const last=React.useRef({x:0,y:0});
  // Preview card dimensions
  const CARD_H=140;

  function startDrag(cx,cy){dragging.current=true;last.current={x:cx,y:cy};}
  function moveDrag(cx,cy){
    if(!dragging.current||!imgRef.current)return;
    const dx=cx-last.current.x;
    const dy=cy-last.current.y;
    last.current={x:cx,y:cy};
    const rect=imgRef.current.getBoundingClientRect();
    const percX=dx/rect.width*100*2;
    const percY=dy/rect.height*100*2;
    setCurPos(p=>({x:Math.min(100,Math.max(0,p.x-percX)),y:Math.min(100,Math.max(0,p.y-percY))}));
  }
  function endDrag(){dragging.current=false;}

  return(
    <div style={{position:"fixed",inset:0,zIndex:400,background:C.bg,display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",background:C.surface,borderBottom:"1px solid "+C.border,flexShrink:0}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:16,color:C.text}}>EDIT COVER</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={onChangeCover} style={{padding:"8px 14px",borderRadius:50,border:"1.5px solid "+C.border,background:"transparent",color:C.text,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,cursor:"pointer",letterSpacing:1}}>CHANGE IMAGE</button>
          <button onClick={()=>onSave(curPos)} style={{padding:"8px 18px",borderRadius:50,border:"none",background:"#111",color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,cursor:"pointer",letterSpacing:1}}>DONE ✓</button>
        </div>
      </div>

      {/* Full image — drag to set focal point */}
      <div style={{flex:1,overflow:"hidden",position:"relative",background:"#000",touchAction:"none"}}
        onMouseDown={e=>{startDrag(e.clientX,e.clientY);e.preventDefault();}}
        onMouseMove={e=>moveDrag(e.clientX,e.clientY)}
        onMouseUp={endDrag} onMouseLeave={endDrag}
        onTouchStart={e=>{const t=e.touches[0];startDrag(t.clientX,t.clientY);}}
        onTouchMove={e=>{const t=e.touches[0];moveDrag(t.clientX,t.clientY);e.preventDefault();}}
        onTouchEnd={endDrag}
      >
        <img ref={imgRef} src={src} draggable={false} style={{width:"100%",height:"100%",objectFit:"contain",pointerEvents:"none",userSelect:"none"}}/>
        {/* Crosshair showing focal point */}
        <div style={{position:"absolute",top:`${curPos.y}%`,left:`${curPos.x}%`,transform:"translate(-50%,-50%)",pointerEvents:"none"}}>
          <div style={{width:40,height:40,borderRadius:"50%",border:"2px solid #fff",boxShadow:"0 0 0 1px rgba(0,0,0,.5)",background:"rgba(255,255,255,.15)"}}/>
          <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",width:4,height:4,borderRadius:"50%",background:"#fff"}}/>
        </div>
        <div style={{position:"absolute",top:12,left:"50%",transform:"translateX(-50%)",background:"rgba(0,0,0,.6)",borderRadius:20,padding:"5px 16px",color:"#fff",fontSize:11,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,whiteSpace:"nowrap",pointerEvents:"none"}}>
          DRAG TO SET FOCAL POINT
        </div>
      </div>

      {/* Live card preview at bottom */}
      <div style={{flexShrink:0,background:C.surface,borderTop:"1px solid "+C.border,padding:"14px 16px"}}>
        <div style={{fontSize:9,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1,marginBottom:8,textAlign:"center"}}>CARD PREVIEW</div>
        <div style={{background:C.surface,borderRadius:16,overflow:"hidden",border:"1px solid "+C.border,maxWidth:200,margin:"0 auto"}}>
          <div style={{height:CARD_H,overflow:"hidden"}}>
            <img src={src} alt="cover" draggable={false} style={{width:"100%",height:"100%",objectFit:"cover",objectPosition:`${curPos.x}% ${curPos.y}%`,pointerEvents:"none"}}/>
          </div>
          <div style={{padding:"8px 10px 10px"}}>
            <div style={{fontSize:9,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,letterSpacing:1}}>{noteSubject||"SUBJECT"}</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:12,color:C.text,marginTop:1,lineHeight:1.2}}>{noteTitle?noteTitle.toUpperCase():"TITLE"}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

function HistoryModal({history,onClose,C,isStudent}){
  const sorted=[...history].sort((a,b)=>b.ended_at-a.ended_at);
  function fmtDate(ms){
    const d=new Date(ms);
    return d.toLocaleDateString([],{weekday:"short",day:"numeric",month:"short",year:"numeric"});
  }
  function fmtTime(h){const hh=Math.floor(h),mm=Math.round((h-hh)*60);const p=hh>=12?"PM":"AM";const h12=hh%12||12;return String(h12).padStart(2,"0")+":"+String(mm).padStart(2,"0")+" "+p;}
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.6)",zIndex:300,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:C.surface,borderRadius:"24px 24px 0 0",width:"100%",maxWidth:430,maxHeight:"88vh",overflowY:"auto",paddingBottom:32}}>
        <div style={{padding:"20px 20px 0",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16}}>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:20,color:C.text,letterSpacing:1}}>📋 HISTORY</div>
            <div style={{fontSize:10,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1}}>{sorted.length} COMPLETED LESSON{sorted.length!==1?"S":""}</div>
          </div>
          <button onClick={onClose} style={{width:36,height:36,borderRadius:10,border:"1.5px solid "+C.border,background:"transparent",color:C.sub,cursor:"pointer",fontSize:16}}>✕</button>
        </div>
        {sorted.length===0&&<div style={{textAlign:"center",padding:"40px 0",color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13}}>NO COMPLETED LESSONS YET</div>}
        <div style={{padding:"0 16px"}}>
          {sorted.map((l,i)=>{
            const prev=sorted[i-1];
            const showDate=!prev||fmtDate(prev.ended_at)!==fmtDate(l.ended_at);
            return(
              <React.Fragment key={l.id}>
                {showDate&&<div style={{fontSize:9,fontWeight:800,letterSpacing:1.5,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",marginTop:i===0?0:16,marginBottom:8,paddingBottom:6,borderBottom:"1px solid "+C.border}}>{fmtDate(l.ended_at)}</div>}
                <div style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid "+C.border}}>
                  <div style={{width:40,height:40,borderRadius:"50%",background:l.online?"#DBEAFE":"#DCF5E4",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,fontSize:18}}>{l.online?"🌐":"📍"}</div>
                  <div style={{flex:1}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:13,color:C.text}}>{l.subject}</div>
                    <div style={{fontSize:10,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginTop:2}}>
                      {isStudent?l.tutor_name:l.student_name}
                    </div>
                  </div>
                  <div style={{textAlign:"right",flexShrink:0}}>
                    <div style={{fontSize:10,fontWeight:800,color:C.text,fontFamily:"'Barlow Condensed',sans-serif"}}>{fmtTime(l.from_hour)} – {fmtTime(l.to_hour)}</div>
                    <div style={{fontSize:9,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginTop:2}}>{l.day}</div>
                  </div>
                </div>
              </React.Fragment>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function TimePicker({value,onChange,label,C}){
  const totalMins=Math.round(value*60);
  const hVal=Math.floor(totalMins/60);
  const mVal=totalMins%60;
  const period=hVal>=12?"PM":"AM";
  const h12=hVal%12||12;
  const [hInput,setHInput]=React.useState(String(h12));
  const [mInput,setMInput]=React.useState(String(mVal).padStart(2,"0"));
  // Sync inputs when value changes externally
  React.useEffect(()=>{
    setHInput(String(hVal%12||12));
    setMInput(String(mVal).padStart(2,"0"));
  },[value]);
  function commitH(raw){
    let h=parseInt(raw);
    if(isNaN(h)||h<1)h=1;
    if(h>12)h=12;
    setHInput(String(h));
    const h24=period==="PM"?(h===12?12:h+12):(h===12?0:h);
    onChange((h24*60+mVal)/60);
  }
  function commitM(raw){
    let m=parseInt(raw);
    if(isNaN(m))m=0;
    if(m<0)m=0;
    if(m>59)m=59;
    setMInput(String(m).padStart(2,"0"));
    onChange((hVal*60+m)/60);
  }
  function togglePeriod(){
    const newH=period==="AM"?hVal+12:hVal-12;
    onChange((newH*60+mVal)/60);
  }
  return(
    <div>
      {label&&<div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:C.sub,marginBottom:6,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>{label}</div>}
      <div style={{display:"flex",alignItems:"center",gap:4,background:C.surfaceAlt,borderRadius:12,border:"1.5px solid "+C.border,padding:"8px 10px"}}>
        <input
          type="text" inputMode="numeric" maxLength={2}
          value={hInput}
          onChange={e=>setHInput(e.target.value)}
          onBlur={e=>commitH(e.target.value)}
          onFocus={e=>e.target.select()}
          style={{width:34,background:"transparent",border:"none",outline:"none",fontSize:22,fontWeight:900,color:C.text,fontFamily:"'Barlow Condensed',sans-serif",textAlign:"center",padding:0}}
        />
        <span style={{fontSize:20,fontWeight:900,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:2}}>:</span>
        <input
          type="text" inputMode="numeric" maxLength={2}
          value={mInput}
          onChange={e=>setMInput(e.target.value)}
          onBlur={e=>commitM(e.target.value)}
          onFocus={e=>e.target.select()}
          style={{width:36,background:"transparent",border:"none",outline:"none",fontSize:22,fontWeight:900,color:C.text,fontFamily:"'Barlow Condensed',sans-serif",textAlign:"center",padding:0}}
        />
        <button onClick={togglePeriod} style={{marginLeft:4,padding:"4px 10px",borderRadius:8,border:"1.5px solid "+C.border,background:C.surface,color:C.text,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer",letterSpacing:1}}>
          {period}
        </button>
      </div>
    </div>
  );
}
function ModeRow({online,setOnline,C}){return(<div style={{display:"flex",gap:10,marginBottom:14}}>{[["📍 OFFLINE",false],["🌐 ONLINE",true]].map(([lbl,val])=><button key={lbl} onClick={()=>setOnline(val)} style={{flex:1,padding:"11px",borderRadius:12,border:"1.5px solid "+(online===val?C.text:C.border),background:online===val?C.accentBg:"transparent",color:online===val?C.accentText:C.text,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer"}}>{lbl}</button>)}</div>);}

function FI({C,placeholder,value,onChange,type="text"}){return <input type={type} placeholder={placeholder} value={value} onChange={onChange} style={{width:"100%",padding:"13px 16px",borderRadius:14,border:"1.5px solid "+C.border,background:C.surfaceAlt,color:C.text,fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"Barlow,sans-serif",marginBottom:14}}/>;}
function JoinBtn({onClick,disabled,loading}){return <button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"16px",borderRadius:50,border:"none",background:disabled?"#AAA":"#111",color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:15,letterSpacing:2,cursor:disabled?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginTop:8}}>{loading?"JOINING…":"JOIN NETWORK"}{!loading&&<span style={{fontSize:16}}>→</span>}</button>;}
