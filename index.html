/* ══ LESSON TIMER ══ */
function LessonTimer({lesson,accepted,C}){
  const [secs,setSecs]=useState(null);
  const [phase,setPhase]=useState("countdown"); // countdown | active | ended
  useEffect(()=>{
    if(!accepted)return;
    const now=Date.now();
    const startMs=lesson.start_ts||now;
    const endMs=startMs+(lesson.to_hour-lesson.from_hour)*3600000;
    function tick(){
      const n=Date.now();
      if(n<startMs){setSecs(Math.ceil((startMs-n)/1000));setPhase("countdown");}
      else if(n<endMs){setSecs(Math.ceil((endMs-n)/1000));setPhase("active");}
      else{setSecs(0);setPhase("ended");}
    }
    tick();
    const id=setInterval(tick,1000);
    return()=>clearInterval(id);
  },[accepted,lesson]);
  if(!accepted||secs===null)return null;
  const fmt=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?`${h}:${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`:`${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`;}
  const color=phase==="active"?"#22C55E":phase==="ended"?"#EF4444":"#F59E0B";
  const label=phase==="countdown"?"STARTS IN":phase==="active"?"ENDS IN":"ENDED";
  return(
    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4,padding:"4px 8px",borderRadius:8,background:color+"22",border:`1px solid ${color}44`}}>
      <div style={{width:6,height:6,borderRadius:"50%",background:color,animation:phase==="active"?"pulse 1s infinite":undefined}}/>
      <span style={{fontSize:9,fontWeight:800,color,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>{label}</span>
      <span style={{fontSize:11,fontWeight:900,color,fontFamily:"'Barlow Condensed',sans-serif"}}>{phase==="ended"?"—":fmt(secs)}</span>
    </div>
  );
}

/* ══ CALL DIALOG ══ */
function CallDialog({lesson,user,role,onCancel,C}){
  const [secs,setSecs]=useState(300); // 5 min
  const [answered,setAnswered]=useState(false);
  const isOnline=lesson.online;
  useEffect(()=>{
    if(answered)return;
    const id=setInterval(()=>{
      setSecs(s=>{
        if(s<=1){clearInterval(id);onCancel("timeout");return 0;}
        return s-1;
      });
    },1000);
    return()=>clearInterval(id);
  },[answered]);
  const fmt=s=>`${String(Math.floor(s/60)).padStart(2,"0")}:${String(s%60).padStart(2,"0")}`;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.85)",zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24}}>
      <div style={{width:80,height:80,borderRadius:"50%",background:"#333",display:"flex",alignItems:"center",justifyContent:"center",fontSize:36,border:"3px solid #22C55E",boxShadow:"0 0 0 8px rgba(34,197,94,.2)"}}>
        {isOnline?"📹":"📞"}

/* ══ CUSTOM PICKER ══ */
function Picker({value,onChange,items,placeholder="Choose…",C,mb=14}){
  const [open,setOpen]=useState(false);
  const norm=items.map(i=>typeof i==="string"?{label:i,value:i}:i);
  const chosen=norm.find(i=>i.value===value);
  return(
    <div style={{position:"relative",marginBottom:mb,zIndex:open?500:1}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",borderRadius:14,border:`1.5px solid ${open?C.text:C.border}`,background:C.surfaceAlt,cursor:"pointer",userSelect:"none"}}>
        <span style={{fontSize:14,color:chosen?C.text:C.sub,fontFamily:"Barlow,sans-serif"}}>{chosen?chosen.label:placeholder}</span>
        <span style={{fontSize:11,color:C.sub,transform:open?"rotate(180deg)":"none",transition:"transform .15s"}}>▾</span>
      </div>
      {open&&(
        <div style={{position:"absolute",left:0,right:0,top:"calc(100% + 4px)",background:C.surface,borderRadius:16,zIndex:9999,overflowY:"auto",maxHeight:220,boxShadow:"0 8px 40px rgba(0,0,0,.2)",border:`1px solid ${C.border}`}}>
          {norm.map((item,i)=>(
            <div key={item.value} onClick={()=>{onChange(item.value);setOpen(false);}} style={{padding:"13px 18px",fontSize:14,fontFamily:"Barlow,sans-serif",cursor:"pointer",color:item.value===value?C.accentText:C.text,background:item.value===value?C.accentBg:"transparent",fontWeight:item.value===value?700:400,borderBottom:i<norm.length-1?`1px solid ${C.border}`:"none"}}>
              {item.label}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

/* ══ SUBJECT MULTI-PICKER (max 3) ══ */
function SubjectMultiPicker({value=[],onChange,C}){
  const [open,setOpen]=useState(false);
  const [search,setSearch]=useState("");
  const filtered=SUBJECTS.filter(s=>s.toLowerCase().includes(search.toLowerCase()));
  return(
    <div style={{marginBottom:14}}>
      <div onClick={()=>setOpen(o=>!o)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 16px",borderRadius:14,border:`1.5px solid ${open?C.text:C.border}`,background:C.surfaceAlt,cursor:"pointer"}}>
        <span style={{fontSize:14,color:value.length?C.text:C.sub,fontFamily:"Barlow,sans-serif"}}>
          {value.length?value.join(", "):"Select up to 3 subjects"}
        </span>
        <span style={{fontSize:11,color:C.sub}}>▾</span>
      </div>
      {open&&(
        <div style={{border:`1px solid ${C.border}`,borderRadius:16,marginTop:4,background:C.surface,boxShadow:"0 8px 40px rgba(0,0,0,.15)",zIndex:999,position:"relative"}}>
          <div style={{padding:"10px 14px 6px"}}>
            <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search subjects…"
              style={{width:"100%",padding:"8px 12px",borderRadius:10,border:`1px solid ${C.border}`,background:C.surfaceAlt,color:C.text,fontSize:13,outline:"none",fontFamily:"Barlow,sans-serif"}}/>
          </div>
          <div style={{maxHeight:180,overflowY:"auto",padding:"4px 0"}}>
            {filtered.map(s=>{
              const sel=value.includes(s);
              const disabled=!sel&&value.length>=3;
              return(
                <div key={s} onClick={()=>{if(disabled)return;onChange(sel?value.filter(x=>x!==s):[...value,s]);}} style={{padding:"10px 16px",fontSize:13,fontFamily:"Barlow,sans-serif",cursor:disabled?"not-allowed":"pointer",color:disabled?C.sub:sel?C.accentText:C.text,background:sel?C.accentBg:"transparent",opacity:disabled?.5:1,display:"flex",alignItems:"center",gap:8}}>
                  <span>{sel?"☑":"☐"}</span>{s}
                </div>
              );
            })}
          </div>
          <div style={{padding:"10px 14px",borderTop:`1px solid ${C.border}`}}>
            <button onClick={()=>setOpen(false)} style={{width:"100%",padding:"10px",borderRadius:50,border:"none",background:C.accentBg,color:C.accentText,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer"}}>DONE ({value.length}/3)</button>
          </div>
        </div>
      )}
    </div>
  );
}

            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,letterSpacing:2,color:C.text}}>STUDENT MODE</span>
          </div>
          <FL>CALLSIGN</FL><FI C={C} placeholder="Full Name" value={p.name} onChange={e=>setP(x=>({...x,name:e.target.value}))}/>

        <Logo dark={false}/>
        <div style={{background:C.surface,borderRadius:28,padding:"28px 22px 24px",width:"100%",boxShadow:"0 4px 40px rgba(0,0,0,.08)"}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:26,letterSpacing:2,textAlign:"center",marginBottom:4,color:C.text}}>WELCOME</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginBottom:20,fontSize:12,color:C.sub}}>
            <span style={{cursor:"pointer",textDecoration:"underline"}} onClick={onBack}>Change Role</span>
            <span>•</span>
            <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,letterSpacing:2,color:C.text}}>TUTOR MODE</span>
          </div>
          <FL>CALLSIGN</FL><FI C={C} placeholder="Full Name" value={p.name} onChange={e=>setP(x=>({...x,name:e.target.value}))}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><FL>AGE</FL><FI C={C} placeholder="Years" type="number" value={p.age} onChange={e=>setP(x=>({...x,age:e.target.value}))}/></div>
            <div><FL>GENDER</FL><Picker value={p.gender} onChange={v=>setP(x=>({...x,gender:v}))} items={GENDERS} placeholder="Select" C={C}/></div>
          </div>
          <FL>CURRICULUM SPECIALIZATION</FL>
          <Picker value={p.level} onChange={v=>setP(x=>({...x,level:v}))} items={LEVELS} placeholder="Choose level" C={C}/>
          <FL>SUBJECTS YOU TEACH (MAX 3)</FL>
          <SubjectMultiPicker value={p.subjects} onChange={v=>setP(x=>({...x,subjects:v}))} C={C}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><FL>ONLINE RATE (KES/HR)</FL><FI C={C} placeholder="e.g. 900" type="number" value={p.rateOnline} onChange={e=>setP(x=>({...x,rateOnline:e.target.value}))}/></div>
            <div><FL>OFFLINE RATE (KES/HR)</FL><FI C={C} placeholder="e.g. 700" type="number" value={p.rateOffline} onChange={e=>setP(x=>({...x,rateOffline:e.target.value}))}/></div>
          </div>
          <FL>ZONE</FL><FI C={C} placeholder="City, Region" value={p.location} onChange={e=>setP(x=>({...x,location:e.target.value}))}/>
          {err&&<div style={{color:"#EF4444",fontSize:12,marginBottom:10,textAlign:"center"}}>{err}</div>}
          <JoinBtn disabled={!p.name||loading} onClick={handleJoin} loading={loading}/>
        </div>
      </div>
    </Shell>
  );
}

/* ══ STUDENT APP ══ */
function StudentApp({user,onLogout}){
  const [dm,setDm]=useState(false);
  const C=dm?dC():lC();
  const [tab,setTab]=useState("timetable");
  const [lessons,setLessons]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showAdd,setShowAdd]=useState(false);
  const [showManage,setShowManage]=useState(false);
  const [showTutors,setShowTutors]=useState(null);
  const [editLesson,setEditLesson]=useState(null);
  const [tutors,setTutors]=useState([]);
  const [requested,setRequested]=useState(new Set());
  const [addForm,setAddForm]=useState({subject:"",day:"MON",from:8,to:9,desc:"",online:false});
  const [saving,setSaving]=useState(false);
  const [notes,setNotes]=useState([]);
  const [notesLoading,setNotesLoading]=useState(true);
  const [archFilter,setArchFilter]=useState("ALL");
  const [archSearch,setArchSearch]=useState("");
  const [interactions,setInteractions]=useState({});
  const [profile,setProfile]=useState(user);
  const [profEdit,setProfEdit]=useState(false);
  const [editP,setEditP]=useState({...user});
  const [profSaving,setProfSaving]=useState(false);
  const [openNote,setOpenNote]=useState(null);
  const [showCancelModal,setShowCancelModal]=useState(null); // lesson
  const [callLesson,setCallLesson]=useState(null);
  const [acceptedLessons,setAcceptedLessons]=useState(new Set()); // lessonIds with accepted requests
  const pfpRef=useRef();

  const fetchLessons=useCallback(async()=>{
    setLoading(true);
    try{
      // Use sample data if user is sample
      if(user.id&&user.id.startsWith("sample-")){
        setLessons([]);setLoading(false);return;
      }
      const data=await sb.get("lessons","?student_id=eq."+user.id+"&order=from_hour.asc");
      setLessons(data);
      // Check which have accepted requests
      const reqs=await sb.get("tutor_requests","?student_id=eq."+user.id+"&status=eq.accepted");
      const ids=new Set(reqs.map(r=>r.lesson_id));
      setAcceptedLessons(ids);
    }catch(e){console.error(e);}
    finally{setLoading(false);}
  },[user.id]);

  const fetchNotes=useCallback(async()=>{
    setNotesLoading(true);
    try{
      if(user.id&&user.id.startsWith("sample-")){
        setNotes(SAMPLE_NOTES);setNotesLoading(false);return;
      }
      const [n,ix]=await Promise.all([
        sb.get("notes","?order=created_at.desc"),
        sb.get("note_interactions","?user_id=eq."+user.id),
      ]);
      setNotes(n.length?n:SAMPLE_NOTES);
      const map={};ix.forEach(i=>{map[i.note_id]={liked:i.liked,saved:i.saved,id:i.id};});
      setInteractions(map);
    }catch(e){setNotes(SAMPLE_NOTES);}
    finally{setNotesLoading(false);}
  },[user.id]);

  const fetchTutors=useCallback(async()=>{
    try{
      if(user.id&&user.id.startsWith("sample-")){setTutors(SAMPLE_PROFILES.filter(p=>p.role==="tutor"));return;}
      const data=await sb.get("profiles","?role=eq.tutor&select=id,name,age,gender,location,hourly_rate_online,hourly_rate_offline,curriculum_level,subjects_taught,flag_count");
      setTutors(data.length?data:SAMPLE_PROFILES.filter(p=>p.role==="tutor"));
    }catch(e){setTutors(SAMPLE_PROFILES.filter(p=>p.role==="tutor"));}
  },[user.id]);

  useEffect(()=>{fetchLessons();},[fetchLessons]);
  useEffect(()=>{fetchNotes();},[fetchNotes]);
  useEffect(()=>{fetchTutors();},[fetchTutors]);

  // Check for lessons that should trigger calls
  useEffect(()=>{
    if(!lessons.length||!acceptedLessons.size)return;
    const interval=setInterval(()=>{
      const now=Date.now();
      lessons.forEach(l=>{
        if(!acceptedLessons.has(l.id))return;
        const start=(l.start_ts||now);
        const diff=now-start;
        if(diff>=0&&diff<60000&&callLesson?.id!==l.id){
          setCallLesson(l);
        }
      });
    },10000);
    return()=>clearInterval(interval);
  },[lessons,acceptedLessons,callLesson]);

  async function handleAddLesson(){
    if(!addForm.subject||saving)return;
    setSaving(true);
    try{
      if(user.id&&user.id.startsWith("sample-")){
        const fake={id:"local-"+Date.now(),student_id:user.id,subject:addForm.subject,day:addForm.day,from_hour:addForm.from,to_hour:addForm.to,description:addForm.desc,online:addForm.online,start_ts:null};
        setLessons(l=>[...l,fake]);setShowAdd(false);setAddForm({subject:"",day:"MON",from:8,to:9,desc:"",online:false});setSaving(false);return;
      }
      const [lesson]=await sb.post("lessons",{student_id:user.id,subject:addForm.subject,day:addForm.day,from_hour:addForm.from,to_hour:addForm.to,description:addForm.desc,online:addForm.online});
      setLessons(l=>[...l,lesson]);setShowAdd(false);setAddForm({subject:"",day:"MON",from:8,to:9,desc:"",online:false});
    }catch(e){console.error(e);}
    finally{setSaving(false);}
  }

  async function handleDeleteLesson(id){
    if(user.id&&user.id.startsWith("sample-")){setLessons(l=>l.filter(x=>x.id!==id));return;}
    try{await sb.del("lessons","?id=eq."+id);setLessons(l=>l.filter(x=>x.id!==id));}catch(e){console.error(e);}
  }

  async function handleSaveEdit(){
    if(!editLesson||saving)return;setSaving(true);
    try{
      if(user.id&&user.id.startsWith("sample-")){setLessons(l=>l.map(x=>x.id===editLesson.id?editLesson:x));setEditLesson(null);setSaving(false);return;}
      await sb.patch("lessons","?id=eq."+editLesson.id,{subject:editLesson.subject,day:editLesson.day,from_hour:editLesson.from_hour,to_hour:editLesson.to_hour,description:editLesson.description,online:editLesson.online});
      setLessons(l=>l.map(x=>x.id===editLesson.id?{...x,...editLesson}:x));setEditLesson(null);
    }catch(e){console.error(e);}finally{setSaving(false);}
  }

  async function handleRequestTutor(tutor,lesson){
    const key=tutor.id+"-"+lesson.id;
    if(requested.has(key))return;
    try{
      if(!user.id.startsWith("sample-")){
        await sb.post("tutor_requests",{lesson_id:lesson.id,student_id:user.id,tutor_id:tutor.id,subject:lesson.subject,day:lesson.day,from_hour:lesson.from_hour,to_hour:lesson.to_hour,online:lesson.online,description:lesson.description,student_name:user.name,status:"pending"});
      }
      setRequested(s=>new Set([...s,key]));
    }catch(e){console.error(e);}
  }

  async function handleInteraction(noteId,field){
    const cur=interactions[noteId]||{liked:false,saved:false};
    const next={...cur,[field]:!cur[field]};
    setInteractions(i=>({...i,[noteId]:next}));
    if(user.id.startsWith("sample-"))return;
    try{
      if(cur.id){await sb.patch("note_interactions","?id=eq."+cur.id,{[field]:next[field]});}
      else{const [row]=await sb.post("note_interactions",{note_id:noteId,user_id:user.id,...next});setInteractions(i=>({...i,[noteId]:{...next,id:row.id}}));}
    }catch(e){setInteractions(i=>({...i,[noteId]:cur}));}
  }

  async function handleCancelLesson(lesson,type){
    setShowCancelModal(null);
    const isSample=user.id.startsWith("sample-");
    if(type==="red"&&!isSample){
      // Flag the tutor
      const reqs=await sb.get("tutor_requests","?lesson_id=eq."+lesson.id+"&status=eq.accepted");
      if(reqs.length){
        const tutorId=reqs[0].tutor_id;
        const [tutor]=await sb.get("profiles","?id=eq."+tutorId);
        if(tutor){await sb.patch("profiles","?id=eq."+tutorId,{flag_count:(tutor.flag_count||0)+1});}
        await sb.patch("tutor_requests","?lesson_id=eq."+lesson.id,{status:"cancelled"});
      }
    }else if(!isSample){
      await sb.patch("tutor_requests","?lesson_id=eq."+lesson.id,{status:"cancelled"});
    }
    handleDeleteLesson(lesson.id);
  }

  async function handleSaveProfile(){
    setProfSaving(true);
    try{
      if(!user.id.startsWith("sample-")){
        await sb.patch("profiles","?id=eq."+user.id,{name:editP.name,age:editP.age?+editP.age:null,gender:editP.gender,location:editP.location,grade:editP.grade});
      }
      setProfile({...profile,...editP});setProfEdit(false);
    }catch(e){console.error(e);}finally{setProfSaving(false);}
  }

  const studentLevel=gradeToLevel(user.grade||profile.grade);
  const getLessonsForDay=d=>lessons.filter(l=>l.day===d).sort((a,b)=>a.from_hour-b.from_hour);
  const getMatchingTutors=(lesson)=>{
    const lessonLevel=studentLevel;
    return tutors.filter(t=>{
      const levelMatch=t.curriculum_level===lessonLevel;
      const subjectMatch=t.subjects_taught&&t.subjects_taught.includes(lesson.subject);
      const notFlagged=(t.flag_count||0)<3;
      return levelMatch&&subjectMatch&&notFlagged;
    });
  };
  const filteredNotes=()=>{
    let n=notes.map(note=>({...note,...(interactions[note.id]||{liked:false,saved:false})}));
    if(archFilter==="FAVORITES")n=n.filter(x=>x.liked);
    if(archFilter==="SAVED")n=n.filter(x=>x.saved);
    if(archSearch)n=n.filter(x=>x.title?.toLowerCase().includes(archSearch.toLowerCase())||x.subject?.toLowerCase().includes(archSearch.toLowerCase()));
    return n;
  };

  return(
    <Shell C={C}>
      {openNote&&<PdfViewer note={openNote} onClose={()=>setOpenNote(null)} C={C}/>}
      {callLesson&&<CallDialog lesson={callLesson} user={user} role="student" onCancel={(r)=>{setCallLesson(null);}} C={C}/>}
      {showCancelModal&&<CancelModal onCancel={(t)=>handleCancelLesson(showCancelModal,t)} onClose={()=>setShowCancelModal(null)} C={C} label="student"/>}

      {tab==="timetable"&&<>
        <AppHeader C={C} dm={dm}>
          <PBtn outline C={C} onClick={()=>setShowManage(true)}>MANAGE</PBtn>
          <PBtn C={C} onClick={()=>setShowAdd(true)}>ADD SLOT</PBtn>
        </AppHeader>
        <Scroll>
          {loading?<Loading C={C}/>:
            <div style={{background:C.surface,margin:"14px 14px 0",borderRadius:20,overflow:"hidden",border:`1px solid ${C.border}`}}>
              {DAYS.map((day,idx)=>{
                const dl=getLessonsForDay(day);
                return(
                  <div key={day} style={{display:"flex",borderBottom:idx<DAYS.length-1?`1px solid ${C.border}`:"none",minHeight:76}}>
                    <div style={{width:60,padding:"16px 0 16px 18px",flexShrink:0}}>
                      <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,letterSpacing:1.5,color:C.sub}}>{day}</span>
                    </div>
                    <div style={{flex:1,padding:"10px 12px 10px 8px",display:"flex",flexDirection:"column",gap:6}}>
                      {dl.length===0?<span style={{fontSize:11,color:C.border,letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,paddingTop:4}}>NO PLANS</span>:
                        dl.map(l=>{
                          const isAccepted=acceptedLessons.has(l.id);
                          return(
                            <div key={l.id} style={{borderRadius:10,padding:"8px 12px",background:subjBg(l.subject),border:"1px solid rgba(0,0,0,.06)",cursor:"pointer",display:"flex",flexDirection:"column",gap:2}} onClick={()=>setShowTutors(l)}>
                              <div style={{fontSize:10,fontWeight:700,color:"#555",fontFamily:"'Barlow Condensed',sans-serif"}}>{timeLbl(l.from_hour)} – {timeLbl(l.to_hour)}</div>
                              <div style={{fontSize:13,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif",color:"#111"}}>{l.subject}</div>
                              <span style={{fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:20,display:"inline-block",fontFamily:"'Barlow Condensed',sans-serif",background:l.online?"#DBEAFE":"#DCF5E4",color:l.online?"#1d4ed8":"#166634",width:"fit-content"}}>{l.online?"ONLINE":"OFFLINE"}</span>
                              <LessonTimer lesson={l} accepted={isAccepted} C={C}/>
                              {isAccepted&&(
                                <button onClick={e=>{e.stopPropagation();setShowCancelModal(l);}} style={{marginTop:4,padding:"4px 10px",borderRadius:50,border:"1px solid #EF4444",background:"transparent",color:"#EF4444",fontSize:9,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,cursor:"pointer",width:"fit-content",letterSpacing:.5}}>CANCEL SESSION</button>
                              )}
                            </div>
                          );
                        })
                      }
                    </div>
                  </div>
                );
              })}
            </div>
          }
        </Scroll>
      </>}

      {tab==="archive"&&<>
        <AppHeader C={C} dm={dm}><AvatarBubble name={profile.name} C={C}/></AppHeader>
        <Scroll>
          <ArchSearch value={archSearch} onChange={setArchSearch} C={C}/>
          <FilterRow value={archFilter} onChange={setArchFilter} C={C}/>
          {notesLoading?<Loading C={C}/>:
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,padding:"0 14px"}}>
              {filteredNotes().length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"32px 0",color:C.sub,fontSize:13,fontFamily:"'Barlow Condensed',sans-serif"}}>NO MATERIALS YET</div>}
              {filteredNotes().map(note=>(
                <div key={note.id} style={{background:C.surface,borderRadius:18,overflow:"hidden",border:`1px solid ${C.border}`,cursor:"pointer"}} onClick={()=>setOpenNote(note)}>
                  <div style={{height:140,position:"relative",background:note.cover_color||"#eee"}}>
                    {note.cover_url?<img src={note.cover_url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>:
                      <div style={{width:"100%",height:"100%",background:note.cover_color||"#eee",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:32,opacity:.35}}>📄</span></div>}
                    {note.rating>0&&<div style={{position:"absolute",top:10,left:10,background:"rgba(255,255,255,.92)",borderRadius:50,padding:"3px 10px",fontSize:12,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",color:"#111"}}>{note.rating}★</div>}
                    <div style={{position:"absolute",bottom:10,right:10,display:"flex",gap:6}}>
                      {[{act:()=>handleInteraction(note.id,"liked"),on:note.liked,a:"❤️",b:"🤍"},{act:()=>handleInteraction(note.id,"saved"),on:note.saved,a:"🔖",b:"🏷️"}].map((btn,i)=>(
                        <button key={i} onClick={e=>{e.stopPropagation();btn.act();}} style={{width:34,height:34,borderRadius:"50%",background:"rgba(255,255,255,.92)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>{btn.on?btn.a:btn.b}</button>
                      ))}
                    </div>
                  </div>
                  <div style={{padding:"10px 12px 12px"}}>
                    <div style={{fontSize:9,fontWeight:800,letterSpacing:1.5,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:4,display:"inline-block",border:`1px solid ${C.border}`,borderRadius:4,padding:"1px 6px"}}>{note.subject?.toUpperCase()}</div>
                    <div style={{fontSize:12,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif",color:C.text,marginBottom:2,lineHeight:1.2}}>{note.title}</div>
                    <div style={{fontSize:10,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>TUTOR: {note.tutor_name?.toUpperCase()}</div>
                    <div style={{fontSize:9,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginTop:3}}>{agoLabel(note.created_at)}</div>
                    <div style={{fontSize:9,color:"#4f46e5",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,marginTop:4}}>TAP TO OPEN PDF →</div>
                  </div>
                </div>
              ))}
            </div>
          }
        </Scroll>
      </>}

      {tab==="identity"&&<>
        <IdentHdr C={C} dm={dm} setDm={setDm} onLogout={onLogout}/>
        <Scroll>
          <ProfCard profile={profile} editP={editP} setEditP={setEditP} editing={profEdit} pfpRef={pfpRef} C={C}/>
          <input type="file" accept="image/*" ref={pfpRef} style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setEditP(p=>({...p,pfp_local:ev.target.result}));r.readAsDataURL(f);}}/>
          <ConfCard C={C} editP={editP} setEditP={setEditP} editing={profEdit} profile={profile} isStudent
            onToggle={()=>{if(profEdit)handleSaveProfile();else{setEditP({...profile});setProfEdit(true);}}} saving={profSaving}/>
          <div style={{height:24}}/>
        </Scroll>
      </>}

      <BotNav tab={tab} setTab={setTab} C={C}/>

      {/* ADD MODAL */}
      {showAdd&&(
        <Modal onClose={()=>setShowAdd(false)} C={C}>
          <MT>📅 New Session</MT><MS C={C}>Configure the educational slot.</MS>
          <ML C={C}>SUBJECT</ML><Picker value={addForm.subject} onChange={v=>setAddForm(f=>({...f,subject:v}))} items={SUBJECTS} placeholder="Select Subject" C={C}/>
          <ML C={C}>DAY</ML><Picker value={addForm.day} onChange={v=>setAddForm(f=>({...f,day:v}))} items={DAYS.map((d,i)=>({label:d+" – "+DAY_FULL[i],value:d}))} placeholder="Select Day" C={C}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><ML C={C}>FROM</ML><Picker value={String(addForm.from)} onChange={v=>setAddForm(f=>({...f,from:+v}))} items={HOURS.map(h=>({label:timeLbl(h),value:String(h)}))} placeholder="From" C={C}/></div>
            <div><ML C={C}>TO</ML><Picker value={String(addForm.to)} onChange={v=>setAddForm(f=>({...f,to:+v}))} items={HOURS.map(h=>({label:timeLbl(h),value:String(h)}))} placeholder="To" C={C}/></div>
          </div>
          <ML C={C}>NOTE FOR TUTOR</ML>
          <input style={miStyle(C)} placeholder="Brief note…" value={addForm.desc} onChange={e=>setAddForm(f=>({...f,desc:e.target.value}))}/>
          <ML C={C}>MODE</ML>
          <div style={{display:"flex",gap:10,marginBottom:14}}>
            {[["📍 OFFLINE",false],["🌐 ONLINE",true]].map(([lbl,val])=>(
              <button key={lbl} onClick={()=>setAddForm(f=>({...f,online:val}))} style={{flex:1,padding:"11px",borderRadius:12,border:`1.5px solid ${addForm.online===val?C.text:C.border}`,background:addForm.online===val?C.accentBg:"transparent",color:addForm.online===val?C.accentText:C.text,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer"}}>{lbl}</button>
            ))}
          </div>
          <SvBtn C={C} onClick={handleAddLesson} loading={saving}>💾 SAVE SLOT</SvBtn>
          <CnBtn C={C} onClick={()=>setShowAdd(false)}>CANCEL</CnBtn>
        </Modal>
      )}

      {/* MANAGE MODAL */}
      {showManage&&(
        <Modal onClose={()=>{setShowManage(false);setEditLesson(null);}} C={C}>
          {editLesson?(
            <>
              <MT>✏️ Edit Session</MT><MS C={C}>Modify details.</MS>
              <ML C={C}>SUBJECT</ML><Picker value={editLesson.subject} onChange={v=>setEditLesson(l=>({...l,subject:v}))} items={SUBJECTS} placeholder="Select" C={C}/>
              <ML C={C}>DAY</ML><Picker value={editLesson.day} onChange={v=>setEditLesson(l=>({...l,day:v}))} items={DAYS.map((d,i)=>({label:d+" – "+DAY_FULL[i],value:d}))} placeholder="Day" C={C}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <div><ML C={C}>FROM</ML><Picker value={String(editLesson.from_hour)} onChange={v=>setEditLesson(l=>({...l,from_hour:+v}))} items={HOURS.map(h=>({label:timeLbl(h),value:String(h)}))} placeholder="From" C={C}/></div>
                <div><ML C={C}>TO</ML><Picker value={String(editLesson.to_hour)} onChange={v=>setEditLesson(l=>({...l,to_hour:+v}))} items={HOURS.map(h=>({label:timeLbl(h),value:String(h)}))} placeholder="To" C={C}/></div>
              </div>
              <div style={{display:"flex",gap:10,marginBottom:14}}>
                {[["📍 OFFLINE",false],["🌐 ONLINE",true]].map(([lbl,val])=>(
                  <button key={lbl} onClick={()=>setEditLesson(l=>({...l,online:val}))} style={{flex:1,padding:"11px",borderRadius:12,border:`1.5px solid ${editLesson.online===val?C.text:C.border}`,background:editLesson.online===val?C.accentBg:"transparent",color:editLesson.online===val?C.accentText:C.text,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer"}}>{lbl}</button>
                ))}
              </div>
              <SvBtn C={C} onClick={handleSaveEdit} loading={saving}>✓ SAVE</SvBtn>
              <CnBtn C={C} onClick={()=>setEditLesson(null)}>← BACK</CnBtn>
            </>
          ):(
            <>
              <MT>⚙️ Manage Slots</MT><MS C={C}>{lessons.length} lesson{lessons.length!==1?"s":""} scheduled</MS>
              {lessons.length===0&&<Empty C={C}>NO LESSONS YET</Empty>}
              {lessons.map(l=>(
                <div key={l.id} style={{background:subjBg(l.subject),borderRadius:14,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:14,color:"#111"}}>{l.subject}</div>
                    <div style={{fontSize:11,color:"#555",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginTop:2}}>{l.day} · {timeLbl(l.from_hour)}–{timeLbl(l.to_hour)}</div>
                  </div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>setEditLesson({...l})} style={{background:"#fff",border:"1px solid #ddd",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,color:"#111"}}>EDIT</button>
                    <button onClick={()=>handleDeleteLesson(l.id)} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,color:"#DC2626"}}>DEL</button>
                  </div>
                </div>
              ))}
              <CnBtn C={C} onClick={()=>setShowManage(false)}>CLOSE</CnBtn>
            </>
          )}
        </Modal>
      )}

      {/* TUTORS MODAL */}
      {showTutors&&(
        <Modal onClose={()=>setShowTutors(null)} C={C}>
          <div style={{fontSize:10,fontWeight:800,letterSpacing:2,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:4}}>SUBJECT</div>
          <MT>{showTutors.subject}</MT>
          <MS C={C}>{showTutors.day} · {timeLbl(showTutors.from_hour)} – {timeLbl(showTutors.to_hour)} · {showTutors.online?"ONLINE":"OFFLINE"}</MS>
          <div style={{fontSize:10,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1,marginBottom:12}}>
            TUTORS FOR {studentLevel?.toUpperCase()||"YOUR LEVEL"}
          </div>
          {getMatchingTutors(showTutors).length===0&&(
            <div style={{textAlign:"center",padding:"20px 0",color:C.sub,fontSize:13,fontFamily:"'Barlow Condensed',sans-serif"}}>
              NO {studentLevel} TUTORS FOR {showTutors.subject} YET
            </div>
          )}
          {getMatchingTutors(showTutors).map(tutor=>{
            const key=tutor.id+"-"+showTutors.id;
            const done=requested.has(key);
            const rate=showTutors.online?tutor.hourly_rate_online:tutor.hourly_rate_offline;
            return(
              <div key={tutor.id} style={{background:C.surfaceAlt,borderRadius:16,padding:"14px 16px",marginBottom:10,border:`1px solid ${C.border}`,display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10}}>
                <div style={{flex:1}}>
                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:15,color:C.text}}>{tutor.name}</div>
                    {(tutor.flag_count||0)>0&&<span style={{fontSize:9,background:"#FEF3C7",color:"#92400E",borderRadius:50,padding:"1px 6px",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800}}>⚑ {tutor.flag_count}/3</span>}
                  </div>
                  <div style={{fontSize:12,color:C.sub,marginTop:2}}>{tutor.age&&tutor.age+" yrs · "}{tutor.gender&&tutor.gender+" · "}{tutor.location}</div>
                  {tutor.subjects_taught&&<div style={{fontSize:11,color:C.sub,marginTop:3}}>{tutor.subjects_taught.join(", ")}</div>}
                  {rate&&<div style={{fontSize:14,fontWeight:800,color:"#22C55E",marginTop:4,fontFamily:"'Barlow Condensed',sans-serif"}}>KES {rate}/hr · {showTutors.online?"Online":"Offline"}</div>}
                </div>
                <button onClick={()=>handleRequestTutor(tutor,showTutors)} style={{padding:"9px 16px",borderRadius:50,cursor:"pointer",whiteSpace:"nowrap",border:`1.5px solid ${done?"#22C55E":C.text}`,background:done?"#22C55E":C.accentBg,color:done?"#fff":C.accentText,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,letterSpacing:1}}>
                  {done?"✓ SENT":"REQUEST"}
                </button>
              </div>
            );
          })}
          <CnBtn C={C} onClick={()=>setShowTutors(null)}>CLOSE</CnBtn>
        </Modal>
      )}
    </Shell>
  );
}

/* ══ TUTOR APP ══ */
function TutorApp({user,onLogout}){
  const [dm,setDm]=useState(false);
  const C=dm?dC():lC();
  const [tab,setTab]=useState("timetable");
  const [requests,setRequests]=useState([]);
  const [reqLoading,setReqLoading]=useState(true);
  const [showManage,setShowManage]=useState(false);
  const [showReq,setShowReq]=useState(null);
  const [reqSaving,setReqSaving]=useState(false);
  const [notes,setNotes]=useState([]);
  const [notesLoading,setNotesLoading]=useState(true);
  const [archFilter,setArchFilter]=useState("ALL");
  const [archSearch,setArchSearch]=useState("");
  const [interactions,setInteractions]=useState({});
  const [showPublish,setShowPublish]=useState(false);
  const [pubForm,setPubForm]=useState({title:"",subject:"",file:null,coverPreview:null,coverFile:null});
  const [publishing,setPublishing]=useState(false);
  const [profile,setProfile]=useState(user);
  const [profEdit,setProfEdit]=useState(false);
  const [editP,setEditP]=useState({...user});
  const [profSaving,setProfSaving]=useState(false);
  const [openNote,setOpenNote]=useState(null);
  const [callLesson,setCallLesson]=useState(null);
  const [showCancelModal,setShowCancelModal]=useState(null);
  const pfpRef=useRef();
  const pdfRef=useRef();
  const coverRef=useRef();

  const fetchRequests=useCallback(async()=>{
    setReqLoading(true);
    try{
      if(user.id.startsWith("sample-")){setRequests([]);setReqLoading(false);return;}
      const data=await sb.get("tutor_requests","?tutor_id=eq."+user.id+"&order=created_at.desc");
      setRequests(data);
    }catch(e){console.error(e);}finally{setReqLoading(false);}
  },[user.id]);

  const fetchNotes=useCallback(async()=>{
    setNotesLoading(true);
    try{
      const [n,ix]=await Promise.all([
        user.id.startsWith("sample-")?Promise.resolve(SAMPLE_NOTES):sb.get("notes","?order=created_at.desc"),
        user.id.startsWith("sample-")?Promise.resolve([]):sb.get("note_interactions","?user_id=eq."+user.id),
      ]);
      setNotes(n.length?n:SAMPLE_NOTES);
      const map={};ix.forEach(i=>{map[i.note_id]={liked:i.liked,saved:i.saved,id:i.id};});
      setInteractions(map);
    }catch(e){setNotes(SAMPLE_NOTES);}finally{setNotesLoading(false);}
  },[user.id]);

  useEffect(()=>{fetchRequests();},[fetchRequests]);
  useEffect(()=>{fetchNotes();},[fetchNotes]);

  const booked=requests.filter(r=>r.status==="accepted");
  const pending=requests.filter(r=>r.status==="pending");
  const getLessonsForDay=d=>booked.filter(l=>l.day===d).sort((a,b)=>a.from_hour-b.from_hour);

  async function handleRespond(reqId,status){
    if(reqSaving)return;setReqSaving(true);
    try{
      if(!user.id.startsWith("sample-"))await sb.patch("tutor_requests","?id=eq."+reqId,{status});
      setRequests(r=>r.map(x=>x.id===reqId?{...x,status}:x));
      setShowReq(null);
      if(status==="accepted")setShowManage(false);
    }catch(e){console.error(e);}finally{setReqSaving(false);}
  }

  async function handleCancelBooked(req,type){
    setShowCancelModal(null);
    if(type==="red"){
      // Flag the student
      if(!user.id.startsWith("sample-")){
        try{
          const [student]=await sb.get("profiles","?id=eq."+req.student_id);
          if(student)await sb.patch("profiles","?id=eq."+req.student_id,{flag_count:(student.flag_count||0)+1});
        }catch(e){}
      }
    }
    if(!user.id.startsWith("sample-")){
      try{await sb.patch("tutor_requests","?id=eq."+req.id,{status:"cancelled"});}catch(e){}
    }
    setRequests(r=>r.map(x=>x.id===req.id?{...x,status:"cancelled"}:x));
  }

  async function handlePublish(){
    if(!pubForm.title||!pubForm.subject||publishing)return;
    setPublishing(true);
    try{
      let pdfUrl=null,coverUrl=null;
      const ts=Date.now();
      if(pubForm.file&&!user.id.startsWith("sample-")){
        try{pdfUrl=await sb.upload("notes-pdfs",user.id+"/"+ts+"-"+pubForm.file.name,pubForm.file);}catch(e){console.warn(e);}
      }
      if(pubForm.coverFile&&!user.id.startsWith("sample-")){
        try{coverUrl=await sb.upload("note-covers",user.id+"/"+ts+"-cover",pubForm.coverFile);}catch(e){console.warn(e);}
      }
      const color=COVER_COLORS[Math.floor(Math.random()*COVER_COLORS.length)];
      const noteData={id:"local-"+ts,title:pubForm.title.toUpperCase(),subject:pubForm.subject,tutor_name:profile.name,created_at:new Date().toISOString(),rating:0,saved:false,liked:false,cover_url:coverUrl||pubForm.coverPreview||null,cover_color:color,pdf_url:pdfUrl};
      if(!user.id.startsWith("sample-")){
        const [n]=await sb.post("notes",{tutor_id:user.id,tutor_name:profile.name,title:pubForm.title.toUpperCase(),subject:pubForm.subject,pdf_url:pdfUrl,cover_url:coverUrl,cover_color:color,rating:0});
        setNotes(ns=>[{...n,cover_url:coverUrl},...ns]);
      }else{
        setNotes(ns=>[noteData,...ns]);
      }
      setPubForm({title:"",subject:"",file:null,coverPreview:null,coverFile:null});setShowPublish(false);
    }catch(e){console.error(e);}finally{setPublishing(false);}
  }

  async function handleInteraction(noteId,field){
    const cur=interactions[noteId]||{liked:false,saved:false};
    const next={...cur,[field]:!cur[field]};
    setInteractions(i=>({...i,[noteId]:next}));
    if(user.id.startsWith("sample-"))return;
    try{
      if(cur.id){await sb.patch("note_interactions","?id=eq."+cur.id,{[field]:next[field]});}
      else{const [row]=await sb.post("note_interactions",{note_id:noteId,user_id:user.id,...next});setInteractions(i=>({...i,[noteId]:{...next,id:row.id}}));}
    }catch(e){setInteractions(i=>({...i,[noteId]:cur}));}
  }

  async function handleSaveProfile(){
    setProfSaving(true);
    try{
      if(!user.id.startsWith("sample-")){
        await sb.patch("profiles","?id=eq."+user.id,{name:editP.name,age:editP.age?+editP.age:null,gender:editP.gender,location:editP.location,curriculum_level:editP.curriculum_level,hourly_rate_online:editP.hourly_rate_online?+editP.hourly_rate_online:null,hourly_rate_offline:editP.hourly_rate_offline?+editP.hourly_rate_offline:null});
      }
      setProfile({...profile,...editP});setProfEdit(false);
    }catch(e){console.error(e);}finally{setProfSaving(false);}
  }

  const filteredNotes=()=>{
    let n=notes.map(note=>({...note,...(interactions[note.id]||{liked:false,saved:false})}));
    if(archFilter==="FAVORITES")n=n.filter(x=>x.liked);
    if(archFilter==="SAVED")n=n.filter(x=>x.saved);
    if(archSearch)n=n.filter(x=>x.title?.toLowerCase().includes(archSearch.toLowerCase())||x.subject?.toLowerCase().includes(archSearch.toLowerCase()));
    return n;
  };

  return(
    <Shell C={C}>
      {openNote&&<PdfViewer note={openNote} onClose={()=>setOpenNote(null)} C={C}/>}
      {callLesson&&<CallDialog lesson={callLesson} user={user} role="tutor" onCancel={()=>setCallLesson(null)} C={C}/>}
      {showCancelModal&&<CancelModal onCancel={(t)=>handleCancelBooked(showCancelModal,t)} onClose={()=>setShowCancelModal(null)} C={C} label="tutor"/>}

      {tab==="timetable"&&<>
        <AppHeader C={C} dm={dm}>
          <PBtn outline C={C} onClick={()=>setShowManage(true)}>MANAGE</PBtn>
        </AppHeader>
        <Scroll>
          {reqLoading?<Loading C={C}/>:
            <div style={{background:C.surface,margin:"14px 14px 0",borderRadius:20,overflow:"hidden",border:`1px solid ${C.border}`}}>
              {DAYS.map((day,idx)=>{
                const dl=getLessonsForDay(day);
                return(
                  <div key={day} style={{display:"flex",borderBottom:idx<DAYS.length-1?`1px solid ${C.border}`:"none",minHeight:76}}>
                    <div style={{width:60,padding:"16px 0 16px 18px",flexShrink:0}}>
                      <span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,letterSpacing:1.5,color:C.sub}}>{day}</span>
                    </div>
                    <div style={{flex:1,padding:"10px 12px 10px 8px",display:"flex",flexDirection:"column",gap:6}}>
                      {dl.length===0?<span style={{fontSize:11,color:C.border,letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,paddingTop:4}}>NO PLANS</span>:
                        dl.map(l=>(
                          <div key={l.id} style={{borderRadius:10,padding:"8px 12px",background:subjBg(l.subject),border:"1px solid rgba(0,0,0,.06)",display:"flex",flexDirection:"column",gap:2}}>
                            <div style={{fontSize:10,fontWeight:700,color:"#555",fontFamily:"'Barlow Condensed',sans-serif"}}>{timeLbl(l.from_hour)} – {timeLbl(l.to_hour)}</div>
                            <div style={{fontSize:13,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif",color:"#111"}}>{l.subject}</div>
                            <div style={{fontSize:11,color:"#555",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>👤 {l.student_name}</div>
                            <span style={{fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:20,display:"inline-block",fontFamily:"'Barlow Condensed',sans-serif",background:l.online?"#DBEAFE":"#DCF5E4",color:l.online?"#1d4ed8":"#166634",width:"fit-content"}}>{l.online?"ONLINE":"OFFLINE"}</span>
                            <LessonTimer lesson={l} accepted={true} C={C}/>
                            <button onClick={()=>setShowCancelModal(l)} style={{marginTop:4,padding:"4px 10px",borderRadius:50,border:"1px solid #EF4444",background:"transparent",color:"#EF4444",fontSize:9,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,cursor:"pointer",width:"fit-content"}}>CANCEL</button>
                          </div>
                        ))
                      }
                    </div>
                  </div>
                );
              })}
            </div>
          }
        </Scroll>
      </>}

      {tab==="archive"&&<>
        <AppHeader C={C} dm={dm}>
          <PBtn C={C} onClick={()=>setShowPublish(true)}><span style={{fontSize:16}}>+</span> PUBLISH</PBtn>
        </AppHeader>
        <Scroll>
          <ArchSearch value={archSearch} onChange={setArchSearch} C={C}/>
          <FilterRow value={archFilter} onChange={setArchFilter} C={C}/>
          {notesLoading?<Loading C={C}/>:
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,padding:"0 14px"}}>
              {filteredNotes().length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"32px 0",color:C.sub,fontSize:13,fontFamily:"'Barlow Condensed',sans-serif"}}>NO MATERIALS YET</div>}
              {filteredNotes().map(note=>(
                <div key={note.id} style={{background:C.surface,borderRadius:18,overflow:"hidden",border:`1px solid ${C.border}`,cursor:"pointer"}} onClick={()=>setOpenNote(note)}>
                  <div style={{height:140,position:"relative",background:note.cover_color||"#eee"}}>
                    {note.cover_url?<img src={note.cover_url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>:
                      <div style={{width:"100%",height:"100%",background:note.cover_color||"#eee",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:32,opacity:.35}}>📄</span></div>}
                    {note.rating>0&&<div style={{position:"absolute",top:10,left:10,background:"rgba(255,255,255,.92)",borderRadius:50,padding:"3px 10px",fontSize:12,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",color:"#111"}}>{note.rating}★</div>}
                    <div style={{position:"absolute",bottom:10,right:10,display:"flex",gap:6}}>
                      {[{act:()=>handleInteraction(note.id,"liked"),on:note.liked,a:"❤️",b:"🤍"},{act:()=>handleInteraction(note.id,"saved"),on:note.saved,a:"🔖",b:"🏷️"}].map((btn,i)=>(
                        <button key={i} onClick={e=>{e.stopPropagation();btn.act();}} style={{width:34,height:34,borderRadius:"50%",background:"rgba(255,255,255,.92)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>{btn.on?btn.a:btn.b}</button>
                      ))}
                    </div>
                  </div>
                  <div style={{padding:"10px 12px 12px"}}>
                    <div style={{fontSize:9,fontWeight:800,letterSpacing:1.5,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:4,display:"inline-block",border:`1px solid ${C.border}`,borderRadius:4,padding:"1px 6px"}}>{note.subject?.toUpperCase()}</div>
                    <div style={{fontSize:12,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif",color:C.text,marginBottom:2,lineHeight:1.2}}>{note.title}</div>
                    <div style={{fontSize:10,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>TUTOR: {note.tutor_name?.toUpperCase()}</div>
                    <div style={{fontSize:9,color:"#4f46e5",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,marginTop:4}}>TAP TO OPEN PDF →</div>
                  </div>
                </div>
              ))}
            </div>
          }
        </Scroll>
      </>}

      {tab==="identity"&&<>
        <IdentHdr C={C} dm={dm} setDm={setDm} onLogout={onLogout}/>
        <Scroll>
          <ProfCard profile={profile} editP={editP} setEditP={setEditP} editing={profEdit} pfpRef={pfpRef} C={C}/>
          <input type="file" accept="image/*" ref={pfpRef} style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setEditP(p=>({...p,pfp_local:ev.target.result}));r.readAsDataURL(f);}}/>
          <ConfCard C={C} editP={editP} setEditP={setEditP} editing={profEdit} profile={profile} isTutor
            onToggle={()=>{if(profEdit)handleSaveProfile();else{setEditP({...profile});setProfEdit(true);}}} saving={profSaving}/>
          <div style={{height:24}}/>
        </Scroll>
      </>}

      <BotNav tab={tab} setTab={setTab} C={C}/>

      {showManage&&(
        <Modal onClose={()=>{setShowManage(false);setShowReq(null);}} C={C}>
          {showReq?(
            <>
              <MT>📩 Student Request</MT><MS C={C}>Review and respond.</MS>
              {[{label:"STUDENT",value:showReq.student_name},{label:"SUBJECT",value:showReq.subject},{label:"DAY",value:DAY_FULL[DAYS.indexOf(showReq.day)]||showReq.day},{label:"TIME",value:timeLbl(showReq.from_hour)+" – "+timeLbl(showReq.to_hour)},{label:"MODE",value:showReq.online?"Online":"Offline"}].map(row=>(
                <div key={row.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
                  <span style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif"}}>{row.label}</span>
                  <span style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:"'Barlow Condensed',sans-serif"}}>{row.value}</span>
                </div>
              ))}
              {showReq.description&&(
                <div style={{marginTop:14,padding:14,borderRadius:12,background:C.surfaceAlt,border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:6}}>STUDENT'S NOTE</div>
                  <div style={{fontSize:13,color:C.text,lineHeight:1.6,fontStyle:"italic"}}>"{showReq.description}"</div>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:16}}>
                <button onClick={()=>handleRespond(showReq.id,"accepted")} style={{flex:1,padding:"14px",borderRadius:50,border:"none",background:"#22C55E",color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:13,cursor:"pointer"}}>{reqSaving?"…":"✓ ACCEPT"}</button>
                <button onClick={()=>handleRespond(showReq.id,"declined")} style={{flex:1,padding:"14px",borderRadius:50,border:"none",background:"#EF4444",color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:13,cursor:"pointer"}}>{reqSaving?"…":"✕ DECLINE"}</button>
              </div>
              <CnBtn C={C} onClick={()=>setShowReq(null)}>← BACK</CnBtn>
            </>
          ):(
            <>
              <MT>⚙️ Manage Sessions</MT><MS C={C}>{booked.length} booked session{booked.length!==1?"s":""}</MS>
              {pending.length>0&&(
                <div style={{background:C.surfaceAlt,borderRadius:14,padding:"12px 14px",marginBottom:16,border:`1px solid ${C.border}`}}>
                  <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:"#F59E0B",fontFamily:"'Barlow Condensed',sans-serif",marginBottom:8}}>📬 {pending.length} PENDING</div>
                  {pending.map((r,i)=>(
                    <div key={r.id} onClick={()=>setShowReq(r)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 0",borderBottom:i<pending.length-1?`1px solid ${C.border}`:"none",cursor:"pointer"}}>
                      <div><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:13,color:C.text}}>{r.subject}</span><span style={{fontSize:11,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginLeft:8}}>{r.student_name}</span></div>
                      <span style={{color:C.sub,fontSize:16}}>›</span>
                    </div>
                  ))}
                </div>
              )}
              {booked.length===0&&pending.length===0&&<Empty C={C}>NO SESSIONS YET</Empty>}
              {booked.map(l=>(
                <div key={l.id} style={{background:subjBg(l.subject),borderRadius:14,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <div>
                    <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:14,color:"#111"}}>{l.subject}</div>
                    <div style={{fontSize:11,color:"#555",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginTop:2}}>{l.day} · {timeLbl(l.from_hour)}–{timeLbl(l.to_hour)} · {l.student_name}</div>
                  </div>
                  <button onClick={()=>setShowCancelModal(l)} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,color:"#DC2626"}}>CANCEL</button>
                </div>
              ))}
              <CnBtn C={C} onClick={()=>setShowManage(false)}>CLOSE</CnBtn>
            </>
          )}
        </Modal>
      )}

      {showPublish&&(
        <Modal onClose={()=>setShowPublish(false)} C={C}>
          <MT>📤 Publish Material</MT><MS C={C}>Share study resources with students.</MS>
          <ML C={C}>COVER IMAGE</ML>
          <div onClick={()=>coverRef.current.click()} style={{height:140,borderRadius:14,border:`2px dashed ${C.border}`,marginBottom:14,overflow:"hidden",cursor:"pointer",background:pubForm.coverPreview?"transparent":C.surfaceAlt,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
            {pubForm.coverPreview?<img src={pubForm.coverPreview} alt="cover" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,color:C.sub}}><span style={{fontSize:28}}>🖼️</span><span style={{fontSize:11,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1}}>TAP TO ADD COVER</span></div>}
            {pubForm.coverPreview&&<div style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,.5)",borderRadius:8,padding:"4px 10px",fontSize:10,color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>CHANGE</div>}
          </div>
          <input type="file" accept="image/*" ref={coverRef} style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setPubForm(p=>({...p,coverPreview:ev.target.result,coverFile:f}));r.readAsDataURL(f);}}/>
          <ML C={C}>TITLE</ML>
          <input style={miStyle(C)} placeholder="e.g. Algebra Chapter 3" value={pubForm.title} onChange={e=>setPubForm(f=>({...f,title:e.target.value}))}/>
          <ML C={C}>SUBJECT</ML>
          <Picker value={pubForm.subject} onChange={v=>setPubForm(f=>({...f,subject:v}))} items={SUBJECTS} placeholder="Select Subject" C={C}/>
          <ML C={C}>PDF FILE</ML>
          <div onClick={()=>pdfRef.current.click()} style={{border:`2px dashed ${pubForm.file?"#22C55E":C.border}`,borderRadius:14,padding:18,textAlign:"center",cursor:"pointer",marginBottom:14,background:pubForm.file?"#F0FDF4":C.surfaceAlt}}>
            {pubForm.file?<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><span style={{fontSize:24}}>📄</span><span style={{fontSize:12,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,color:"#15803d"}}>{pubForm.file.name}</span><span style={{fontSize:10,color:"#15803d",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>TAP TO CHANGE</span></div>:
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,color:C.sub}}><span style={{fontSize:28}}>📎</span><span style={{fontSize:11,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1}}>TAP TO ATTACH PDF</span></div>}
          </div>
          <input type="file" accept=".pdf" ref={pdfRef} style={{display:"none"}} onChange={e=>setPubForm(f=>({...f,file:e.target.files[0]}))}/>
          <SvBtn C={C} onClick={handlePublish} loading={publishing}>📤 PUBLISH</SvBtn>
          <CnBtn C={C} onClick={()=>setShowPublish(false)}>CANCEL</CnBtn>
        </Modal>
      )}
    </Shell>
  );
}

/* ══ SHARED UI ══ */
function Shell({C,children}){return <div style={{fontFamily:"Barlow,sans-serif",background:C.bg,color:C.text,height:"100vh",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>{children}</div>;}
function Scroll({children}){return <div style={{flex:1,overflowY:"auto",paddingBottom:72}}>{children}</div>;}
function AppHeader({C,dm,children}){
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 20px 14px",background:C.surface,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
      <Logo dark={dm}/>
      <div style={{display:"flex",gap:10,alignItems:"center"}}>{children}</div>
    </div>
  );
}
function IdentHdr({C,dm,setDm,onLogout}){
  return(
    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px 10px",background:C.surface,borderBottom:`1px solid ${C.border}`,flexShrink:0}}>
      <Logo dark={dm}/>
      <div style={{display:"flex",gap:10}}>
        <button onClick={()=>setDm(d=>!d)} style={{width:40,height:40,borderRadius:12,border:`1.5px solid ${C.border}`,background:C.surface,fontSize:18,cursor:"pointer"}}>{dm?"☀️":"🌙"}</button>
        <button onClick={onLogout} style={{width:40,height:40,borderRadius:12,border:`1.5px solid ${C.border}`,background:C.surface,fontSize:15,cursor:"pointer",color:"#EF4444"}}>↪</button>
      </div>
    </div>
  );
}
function PBtn({C,children,onClick,outline}){return <button onClick={onClick} style={{padding:"9px 20px",borderRadius:50,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,letterSpacing:1.5,display:"flex",alignItems:"center",gap:6,border:outline?`1.5px solid ${C.border}`:"none",background:outline?"transparent":C.accentBg,color:outline?C.text:C.accentText}}>{children}</button>;}
function AvatarBubble({name,C}){return <div style={{width:36,height:36,borderRadius:"50%",background:C.accentBg,display:"flex",alignItems:"center",justifyContent:"center",color:C.accentText,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:14}}>{name?name[0].toUpperCase():"?"}</div>;}
function Loading({C}){return <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"48px 0",color:C.sub,fontSize:13,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1,fontWeight:700}}>LOADING…</div>;}
function Empty({C,children}){return <div style={{textAlign:"center",padding:"24px 0",color:C.sub,fontSize:13,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>{children}</div>;}
function ArchSearch({value,onChange,C}){return(
  <div style={{margin:"14px 14px 10px",position:"relative"}}>
    <span style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",fontSize:16,color:C.sub}}>🔍</span>
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder="Search collective database…" style={{width:"100%",padding:"13px 16px 13px 44px",borderRadius:50,border:`1.5px solid ${C.border}`,background:C.surface,color:C.text,fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"Barlow,sans-serif"}}/>
  </div>
);}
function FilterRow({value,onChange,C}){return(
  <div style={{display:"flex",margin:"0 14px 14px",background:C.surface,borderRadius:50,padding:4,border:`1px solid ${C.border}`}}>
    {["ALL","FAVORITES","SAVED"].map(f=>(
      <button key={f} onClick={()=>onChange(f)} style={{flex:1,padding:"8px 0",borderRadius:50,border:"none",cursor:"pointer",background:value===f?C.accentBg:"transparent",color:value===f?C.accentText:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,letterSpacing:1.5}}>{f}</button>
    ))}
  </div>
);}
function BotNav({tab,setTab,C}){
  const tabs=[{id:"timetable",label:"TIMETABLE",icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},{id:"archive",label:"ARCHIVE",icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>},{id:"identity",label:"IDENTITY",icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>}];
  return(
    <div style={{position:"absolute",bottom:0,left:0,right:0,background:C.surface,borderTop:`1px solid ${C.border}`,borderRadius:"20px 20px 0 0",display:"flex",padding:"6px 0 10px"}}>
      {tabs.map(n=><button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"8px 0",color:tab===n.id?C.text:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:10,letterSpacing:1.5}}>{n.icon}{n.label}</button>)}
    </div>
  );
}
function Modal({children,onClose,C}){return(
  <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
    <div style={{background:C.surface,borderRadius:"24px 24px 0 0",width:"100%",maxWidth:430,padding:"24px 22px 36px",maxHeight:"88vh",overflowY:"auto"}}>{children}</div>
  </div>
);}
function MT({children}){return <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:22,letterSpacing:1,marginBottom:4,display:"flex",alignItems:"center",gap:8}}>{children}</div>;}
function MS({children,C}){return <div style={{fontSize:13,color:C.sub,marginBottom:20}}>{children}</div>;}
function ML({children,C}){return <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:C.sub,marginBottom:6,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>{children}</div>;}
function SvBtn({C,children,onClick,loading}){return <button onClick={onClick} disabled={loading} style={{width:"100%",padding:"15px",borderRadius:50,border:"none",background:C.accentBg,color:C.accentText,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:14,letterSpacing:2,cursor:loading?"not-allowed":"pointer",opacity:loading?.7:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:4}}>{loading?"SAVING…":children}</button>;}
function CnBtn({C,children,onClick}){return <button onClick={onClick} style={{width:"100%",padding:"14px",borderRadius:50,border:`1.5px solid ${C.border}`,background:"transparent",color:C.text,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,letterSpacing:1,cursor:"pointer",marginTop:10}}>{children}</button>;}
function FL({children}){return <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:"#888",marginBottom:6,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",marginTop:4}}>{children}</div>;}
function FI({C,placeholder,value,onChange,type="text"}){return <input type={type} placeholder={placeholder} value={value} onChange={onChange} style={{width:"100%",padding:"13px 16px",borderRadius:14,border:`1.5px solid ${C.border}`,background:C.surfaceAlt,color:C.text,fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"Barlow,sans-serif",marginBottom:14}}/>;}
function JoinBtn({onClick,disabled,loading}){return <button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"16px",borderRadius:50,border:"none",background:disabled?"#AAA":"#111",color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:15,letterSpacing:2,cursor:disabled?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginTop:8}}>{loading?"JOINING…":"JOIN NETWORK"}{!loading&&<span style={{fontSize:16}}>→</span>}</button>;}
function miStyle(C){return{width:"100%",padding:"13px 16px",borderRadius:14,border:`1.5px solid ${C.border}`,background:C.surfaceAlt,color:C.text,fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:14,fontFamily:"Barlow,sans-serif"};}
function ProfCard({profile,editP,setEditP,editing,pfpRef,C}){
  const src=editP.pfp_local||profile.pfp_url||null;
  return(
    <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:24,margin:"0 14px 16px",padding:"28px 20px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
      <div onClick={()=>editing&&pfpRef.current.click()} style={{width:96,height:96,borderRadius:"50%",background:C.surfaceAlt,border:`2px solid ${C.border}`,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",cursor:editing?"pointer":"default"}}>
        {src?<img src={src} style={{width:"100%",height:"100%",objectFit:"cover"}} alt="pfp"/>:<span style={{fontSize:40}}>👤</span>}
        <div style={{position:"absolute",bottom:0,right:0,width:28,height:28,borderRadius:"50%",background:C.accentBg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14}}>📷</div>
      </div>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:24,letterSpacing:2,color:C.text,textAlign:"center"}}>{profile.name||"YOUR NAME"}</div>
      <div style={{fontSize:12,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1}}>{[profile.age&&profile.age+" YRS",profile.grade||profile.curriculum_level].filter(Boolean).join(" • ")||"—"}</div>
      {profile.role==="tutor"&&profile.flag_count>0&&(
        <div style={{fontSize:11,color:"#EF4444",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800}}>⚑ {profile.flag_count}/3 FLAGS</div>
      )}
    </div>
  );
}
function ConfCard({C,editP,setEditP,editing,profile,onToggle,isStudent,isTutor,saving}){
  const sF=[{label:"CALLSIGN",key:"name",icon:"👤",type:"text",ph:"Full Name"},{label:"ZONE",key:"location",icon:"📍",type:"text",ph:"City, Region"},{label:"AGE",key:"age",icon:"🎂",type:"number",ph:"Years"},{label:"GENDER",key:"gender",icon:"⚧",items:GENDERS},{label:"ACADEMIC GRADE",key:"grade",icon:"🎓",items:STUDENT_GRADES}];
  const tF=[{label:"CALLSIGN",key:"name",icon:"👤",type:"text",ph:"Full Name"},{label:"ZONE",key:"location",icon:"📍",type:"text",ph:"City, Region"},{label:"AGE",key:"age",icon:"🎂",type:"number",ph:"Years"},{label:"GENDER",key:"gender",icon:"⚧",items:GENDERS},{label:"CURRICULUM LEVEL",key:"curriculum_level",icon:"🎓",items:LEVELS},{label:"ONLINE RATE (KES/HR)",key:"hourly_rate_online",icon:"🌐",type:"number",ph:"e.g. 900"},{label:"OFFLINE RATE (KES/HR)",key:"hourly_rate_offline",icon:"📍",type:"number",ph:"e.g. 700"}];
  const fields=isTutor?tF:sF;
  return(
    <div style={{background:C.surface,borderRadius:20,margin:"0 14px",padding:"20px 18px",border:`1px solid ${C.border}`}}>
      <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:18,letterSpacing:2,textAlign:"center",color:C.text,marginBottom:2}}>CONFIGURATION</div>
      <div style={{fontSize:10,color:C.sub,textAlign:"center",letterSpacing:1.5,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:20}}>ADJUST YOUR IDENTITY DETAILS.</div>
      {fields.map(f=>(
        <div key={f.key} style={{marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:8,display:"flex",alignItems:"center",gap:6,textTransform:"uppercase"}}>{f.icon} {f.label}</div>
          {editing?f.items?<Picker value={editP[f.key]||""} onChange={v=>setEditP(p=>({...p,[f.key]:v}))} items={f.items} placeholder="Choose…" C={C}/>:<input type={f.type} placeholder={f.ph} value={editP[f.key]||""} onChange={e=>setEditP(p=>({...p,[f.key]:e.target.value}))} style={{width:"100%",background:"transparent",border:"none",borderBottom:`1px solid ${C.text}`,padding:"8px 0",fontSize:15,color:C.text,fontFamily:"Barlow,sans-serif",outline:"none"}}/>:
            <div style={{borderBottom:`1px solid ${C.border}`,padding:"8px 0",fontSize:15,color:C.text,fontFamily:"Barlow,sans-serif",display:"flex",alignItems:"center",gap:10}}><span style={{color:C.sub,fontSize:14}}>{f.icon}</span><span>{profile[f.key]||"—"}</span></div>}
        </div>
      ))}
      <button onClick={onToggle} style={{width:"100%",padding:"15px",borderRadius:50,border:"none",background:C.accentBg,color:C.accentText,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:14,letterSpacing:2,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:16}}>
        {saving?"SAVING…":editing?"✓  SAVE IDENTITY":"✏  EDIT IDENTITY"}
      </button>
    </div>
  );
}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<AppRoot/>);
</script>
</body>
</html>
