  <style>
    body,html{margin:0;padding:0;height:100%;font-family:'Barlow',sans-serif;background:#F0F2F5;color:#111;overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent;}
    #root{height:100%;display:flex;flex-direction:column;}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    function Logo() {
      return (
        <div style={{
          fontSize: "42px",       // Bigger size
          fontWeight: "900",      // Bolder weight
          color: "#000",
          background: "none",     // Colorless background
          textAlign: "center",
          fontFamily: "'Barlow Condensed', sans-serif",
          padding: "30px 0 10px 0",
          letterSpacing: "-1px"
        }}>
          JRSH
        </div>
      );
    }

    function ST({C}){
      return (
        <style>{`
          .pill-active { background: #111 !important; color: #fff !important; border-color: #111 !important; }
          @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
          .loader { border: 2.5px solid rgba(255,255,255,0.3); border-top: 2.5px solid #fff; border-radius: 50%; width: 16px; height: 16px; animation: spin 0.8s linear infinite; }
        `}</style>
      );
    }

    function Card({children, style}){
      return <div style={{background:"#fff",borderRadius:24,padding:24,boxShadow:"0 10px 40px rgba(0,0,0,0.04)",...style}}>{children}</div>;
    }

    function Pill({lbl,active,onClick}){
      return (
        <div onClick={onClick} className={active?'pill-active':''} style={{
          padding:"10px 18px",borderRadius:50,border:"1.5px solid #EEE",fontSize:13,fontWeight:700,cursor:"pointer",
          transition:"all 0.2s",background:"#fff",color:"#666",whiteSpace:"nowrap"
        }}>{lbl}</div>
      );
    }

    function CancelBtn({ onClick }) {
      return (
        <button 
          onClick={onClick}
          style={{
            width: "100%",
            padding: "16px",
            borderRadius: 50,
            border: "none",
            background: "#000", // Black background
            color: "#fff",      // White text
            fontFamily: "'Barlow Condensed', sans-serif",
            fontWeight: 800,
            fontSize: 15,
            letterSpacing: 2,
            cursor: "pointer",
            marginTop: 8
          }}
        >
          CANCEL LESSON
        </button>
      );
    }

    function JoinBtn({onClick,disabled,loading}){
      return (
        <button onClick={onClick} disabled={disabled} style={{
          width:"100%",padding:"16px",borderRadius:50,border:"none",
          background:disabled?"#AAA":"#111",color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",
          fontWeight:800,fontSize:15,letterSpacing:2,cursor:disabled?"not-allowed":"pointer",
          display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginTop:8
        }}>
          {loading ? <div className="loader"/> : "JOIN NETWORK"}
          {!loading && <span style={{fontSize:16}}>→</span>}
        </button>
      );
    }

    function App() {
      const [view, setView] = useState('join');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [network, setNetwork] = useState('J-PRIVATE');

      const handleJoin = async () => {
        setLoading(true);
        setError('');
        
        try {
          // Robust check: try to fetch a known small resource instead of just navigator.onLine
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 5000);
          
          await fetch('https://www.google.com/generate_204', { mode: 'no-cors', signal: controller.signal });
          clearTimeout(timeoutId);
          
          setTimeout(() => {
            setLoading(false);
            setView('connected');
          }, 1500);
        } catch (e) {
          setLoading(false);
          // Only show error if the actual request fails (real internet issue)
          setError('COULD NOT CONNECT. CHECK YOUR INTERNET.');
        }
      };

      const handleCancel = () => {
        setView('join');
      };

      return (
        <div style={{padding:20,maxWidth:400,margin:"0 auto",width:"100%",boxSizing:"border-box"}}>
          <ST />
          <Logo />
          
          {view === 'join' ? (
            <Card style={{marginTop:20}}>
              <div style={{fontSize:24,fontWeight:800,marginBottom:8,letterSpacing:-0.5}}>Secure Connect</div>
              <div style={{fontSize:14,color:"#666",marginBottom:24,lineHeight:1.4}}>Select a private node to begin your session.</div>
              
              <div style={{display:"flex",gap:8,marginBottom:24,overflowX:"auto",paddingBottom:4}}>
                {['J-PRIVATE','NODE-B','SECURE-X'].map(n => (
                  <Pill key={n} lbl={n} active={network===n} onClick={()=>setNetwork(n)} />
                ))}
              </div>

              {error && <div style={{color:"#E53935",fontSize:12,fontWeight:800,marginBottom:16,textAlign:"center"}}>{error}</div>}
              
              <JoinBtn onClick={handleJoin} loading={loading} />
            </Card>
          ) : (
            <Card style={{marginTop:20,textAlign:"center"}}>
              <div style={{width:60,height:60,background:"#E8F5E9",borderRadius:50,display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 20px"}}>
                <span style={{fontSize:30}}>✓</span>
              </div>
              <div style={{fontSize:22,fontWeight:800,marginBottom:8}}>Connected</div>
              <div style={{fontSize:14,color:"#666",marginBottom:30}}>Lesson session is active on {network}.</div>
              
              <CancelBtn onClick={handleCancel} />
            </Card>
          )}
          
          <div style={{textAlign:"center",marginTop:30,fontSize:11,color:"#AAA",fontWeight:700,letterSpacing:1}}>
            ENCRYPTED END-TO-END
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
