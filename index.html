/* ══ LESSON TIMER ══ */
function LessonTimer({lesson,C}){
  const [secs,setSecs]=useState(null);
  const [phase,setPhase]=useState("countdown");
  useEffect(()=>{
    const startMs=lesson.start_ts||Date.now();
    const endMs=startMs+(lesson.to_hour-lesson.from_hour)*3600000;
    function tick(){
      const n=Date.now();
      if(n<startMs){setSecs(Math.ceil((startMs-n)/1000));setPhase("countdown");}
      else if(n<endMs){setSecs(Math.ceil((endMs-n)/1000));setPhase("active");}
      else{setSecs(0);setPhase("ended");}
    }
    tick();
    const id=setInterval(tick,1000);
    return()=>clearInterval(id);
  },[lesson.start_ts,lesson.from_hour,lesson.to_hour]);
  if(secs===null)return null;
  const fmt=s=>{const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sc=s%60;return h>0?h+":"+String(m).padStart(2,"0")+":"+String(sc).padStart(2,"0"):String(m).padStart(2,"0")+":"+String(sc).padStart(2,"0");};
  const color=phase==="active"?"#22C55E":phase==="ended"?"#EF4444":"#F59E0B";
  const label=phase==="countdown"?"STARTS IN":phase==="active"?"ENDS IN":"ENDED";
  return(
    <div style={{display:"flex",alignItems:"center",gap:6,marginTop:4,padding:"4px 8px",borderRadius:8,background:color+"22",border:"1px solid "+color+"44"}}>
      <div style={{width:6,height:6,borderRadius:"50%",background:color,animation:phase==="active"?"pulse 1s infinite":"none"}}/>
      <span style={{fontSize:9,fontWeight:800,color,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>{label}</span>
      <span style={{fontSize:12,fontWeight:900,color,fontFamily:"'Barlow Condensed',sans-serif"}}>{phase==="ended"?"DONE":fmt(secs)}</span>
    </div>
  );
}

/* ══ CALL DIALOG ══ */
function CallDialog({lesson,onEnd,C}){
  const [secs,setSecs]=useState(300);
  const [answered,setAnswered]=useState(false);
  const isOnline=lesson.online;
  useEffect(()=>{
    if(answered)return;
    const id=setInterval(()=>setSecs(s=>{if(s<=1){clearInterval(id);onEnd("timeout");return 0;}return s-1;}),1000);
    return()=>clearInterval(id);
  },[answered]);
  const fmt=s=>String(Math.floor(s/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0");
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:24,fontFamily:"'Barlow',sans-serif"}}>

      <div style={{textAlign:"center"}}>
        <div style={{color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:22,letterSpacing:1}}>{isOnline?"VIDEO CALL":"CALL"}</div>
        <div style={{color:"#aaa",fontSize:13,marginTop:4}}>{lesson.subject} session</div>
        {!answered&&<><div style={{color:"#F59E0B",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:26,marginTop:10}}>{fmt(secs)}</div><div style={{color:"#666",fontSize:11,marginTop:2}}>drops if unanswered</div></>}
      </div>
      {!answered?(
        <div style={{display:"flex",gap:24}}>
          <button onClick={()=>onEnd("declined")} style={{width:64,height:64,borderRadius:"50%",background:"#EF4444",border:"none",cursor:"pointer",fontSize:26}}>📵</button>
          <button onClick={()=>setAnswered(true)} style={{width:64,height:64,borderRadius:"50%",background:"#22C55E",border:"none",cursor:"pointer",fontSize:26}}>{isOnline?"📹":"📞"}</button>
        </div>

/* ══ STUDENT APP ══ */
function StudentApp({user,onLogout}){
  const isSample=user.id&&user.id.startsWith("sample-");
  const [dm,setDm]=useState(false);
  const C=dm?dC():lC();
  const [tab,setTab]=useState("timetable");
  const [lessons,setLessons]=useState(isSample?SAMPLE_LESSONS_STUDENT:[]);
  const [loadingL,setLoadingL]=useState(!isSample);
  const [acceptedMap,setAcceptedMap]=useState(isSample?{"sl1":true}:{});
  const [showAdd,setShowAdd]=useState(false);
  const [showManage,setShowManage]=useState(false);
  const [showTutors,setShowTutors]=useState(null);
  const [editLesson,setEditLesson]=useState(null);
  const [requested,setRequested]=useState(new Set());
  const [addForm,setAddForm]=useState({subject:"",day:"MON",from:8,to:9,desc:"",online:false});
  const [saving,setSaving]=useState(false);
  const [tutors,setTutors]=useState(isSample?SAMPLE_TUTORS:[]);
  const [notes,setNotes]=useState(isSample?SAMPLE_NOTES:[]);
  const [loadingN,setLoadingN]=useState(!isSample);
  const [archFilter,setArchFilter]=useState("ALL");
  const [archSearch,setArchSearch]=useState("");
  const [interactions,setInteractions]=useState({});
  const [profile,setProfile]=useState(user);
  const [profEdit,setProfEdit]=useState(false);
  const [editP,setEditP]=useState({...user});
  const [profSaving,setProfSaving]=useState(false);
  const [openNote,setOpenNote]=useState(null);
  const [cancelLesson,setCancelLesson]=useState(null);
  const [callLesson,setCallLesson]=useState(null);
  const pfpRef=useRef();

  // Fetch data for real users
  useEffect(()=>{
    if(isSample)return;
    (async()=>{
      setLoadingL(true);
      try{
        const data=await sb.get("lessons","?student_id=eq."+user.id+"&order=from_hour.asc");
        setLessons(data);
        const reqs=await sb.get("tutor_requests","?student_id=eq."+user.id+"&status=eq.accepted");
        const m={};reqs.forEach(r=>{m[r.lesson_id]=true;});
        setAcceptedMap(m);
      }catch(e){}finally{setLoadingL(false);}
    })();
  },[isSample,user.id]);
  useEffect(()=>{
    if(isSample)return;
    (async()=>{
      setLoadingN(true);
      try{
        const [n,ix]=await Promise.all([sb.get("notes","?order=created_at.desc"),sb.get("note_interactions","?user_id=eq."+user.id)]);
        setNotes(n.length?n:SAMPLE_NOTES);
        const map={};ix.forEach(i=>{map[i.note_id]={liked:i.liked,saved:i.saved,id:i.id};});
        setInteractions(map);
      }catch(e){setNotes(SAMPLE_NOTES);}finally{setLoadingN(false);}
    })();
    (async()=>{
      try{const data=await sb.get("profiles","?role=eq.tutor&select=id,name,age,gender,location,hourly_rate_online,hourly_rate_offline,curriculum_level,subjects_taught");setTutors(data.length?data:SAMPLE_TUTORS);}catch(e){setTutors(SAMPLE_TUTORS);}
    })();
  },[isSample,user.id]);

  // Trigger call when accepted lesson starts
  useEffect(()=>{
    const interval=setInterval(()=>{
      const now=Date.now();
      lessons.forEach(l=>{
        if(!acceptedMap[l.id]||!l.start_ts)return;
        const diff=now-l.start_ts;
        if(diff>=0&&diff<30000&&callLesson?.id!==l.id){setCallLesson(l);}
      });
    },5000);
    return()=>clearInterval(interval);
  },[lessons,acceptedMap,callLesson]);

  async function handleAddLesson(){
    if(!addForm.subject||saving)return;
    setSaving(true);
    try{
      if(isSample){
        const fake={id:"local-"+Date.now(),student_id:user.id,subject:addForm.subject,day:addForm.day,from_hour:addForm.from,to_hour:addForm.to,description:addForm.desc,online:addForm.online,start_ts:null};
        setLessons(l=>[...l,fake]);
      }else{
        const [lesson]=await sb.post("lessons",{student_id:user.id,subject:addForm.subject,day:addForm.day,from_hour:addForm.from,to_hour:addForm.to,description:addForm.desc,online:addForm.online});
        setLessons(l=>[...l,lesson]);
      }
      setShowAdd(false);setAddForm({subject:"",day:"MON",from:8,to:9,desc:"",online:false});
    }catch(e){}finally{setSaving(false);}
  }

  async function handleDeleteLesson(id){
    if(isSample){setLessons(l=>l.filter(x=>x.id!==id));return;}
    try{await sb.del("lessons","?id=eq."+id);setLessons(l=>l.filter(x=>x.id!==id));}catch(e){}
  }

  async function handleSaveEdit(){
    if(!editLesson||saving)return;setSaving(true);
    try{
      if(!isSample)await sb.patch("lessons","?id=eq."+editLesson.id,{subject:editLesson.subject,day:editLesson.day,from_hour:editLesson.from_hour,to_hour:editLesson.to_hour,description:editLesson.description,online:editLesson.online});
      setLessons(l=>l.map(x=>x.id===editLesson.id?{...x,...editLesson}:x));setEditLesson(null);
    }catch(e){}finally{setSaving(false);}
  }

  async function handleRequestTutor(tutor,lesson){
    const key=tutor.id+"-"+lesson.id;
    if(requested.has(key))return;
    try{
      if(!isSample)await sb.post("tutor_requests",{lesson_id:lesson.id,student_id:user.id,tutor_id:tutor.id,subject:lesson.subject,day:lesson.day,from_hour:lesson.from_hour,to_hour:lesson.to_hour,online:lesson.online,description:lesson.description,student_name:user.name,status:"pending"});
      setRequested(s=>new Set([...s,key]));
    }catch(e){}
  }

  async function handleInteraction(noteId,field){
    const cur=interactions[noteId]||{liked:false,saved:false};
    const next={...cur,[field]:!cur[field]};
    setInteractions(i=>({...i,[noteId]:next}));
    if(isSample)return;
    try{
      if(cur.id){await sb.patch("note_interactions","?id=eq."+cur.id,{[field]:next[field]});}
      else{const [row]=await sb.post("note_interactions",{note_id:noteId,user_id:user.id,...next});setInteractions(i=>({...i,[noteId]:{...next,id:row.id}}));}
    }catch(e){setInteractions(i=>({...i,[noteId]:cur}));}
  }

  async function handleCancelSession(lesson,type){
    setCancelLesson(null);
    if(!isSample){
      try{await sb.patch("tutor_requests","?lesson_id=eq."+lesson.id,{status:"cancelled"});}catch(e){}
    }
    handleDeleteLesson(lesson.id);
  }

  async function handleSaveProfile(){
    setProfSaving(true);
    try{
      if(!isSample)await sb.patch("profiles","?id=eq."+user.id,{name:editP.name,age:editP.age?+editP.age:null,gender:editP.gender,location:editP.location,grade:editP.grade});
      setProfile({...profile,...editP});setProfEdit(false);
    }catch(e){}finally{setProfSaving(false);}
  }

  const studentLevel=gradeToLevel(user.grade||profile.grade);
  const getLessonsForDay=d=>lessons.filter(l=>l.day===d).sort((a,b)=>a.from_hour-b.from_hour);
  const getMatchingTutors=lesson=>tutors.filter(t=>{
    const levelMatch=t.curriculum_level===studentLevel;
    const subjectMatch=t.subjects_taught&&t.subjects_taught.includes(lesson.subject);
    return levelMatch&&subjectMatch;
  });
  const filteredNotes=()=>{
    let n=notes.map(note=>({...note,...(interactions[note.id]||{liked:false,saved:false})}));
    if(archFilter==="FAVORITES")n=n.filter(x=>x.liked);
    if(archFilter==="SAVED")n=n.filter(x=>x.saved);
    if(archSearch)n=n.filter(x=>x.title?.toLowerCase().includes(archSearch.toLowerCase())||x.subject?.toLowerCase().includes(archSearch.toLowerCase()));
    return n;
  };

  return(
    <Shell C={C}>
      {openNote&&<PdfViewer note={openNote} onClose={()=>setOpenNote(null)} C={C}/>}
      {callLesson&&<CallDialog lesson={callLesson} onEnd={(reason)=>{
        if(callLesson.online||reason==="ended"||reason==="timeout"){
          setLessons(ls=>ls.filter(l=>l.id!==callLesson.id));
          setAcceptedMap(m=>{const n={...m};delete n[callLesson.id];return n;});
        }
        setCallLesson(null);
      }} C={C}/>}
      {cancelLesson&&<CancelModal onCancel={t=>handleCancelSession(cancelLesson,t)} onClose={()=>setCancelLesson(null)} C={C}/>}

      {tab==="timetable"&&<>
        <Hdr C={C} dm={dm}><PBtn outline C={C} onClick={()=>setShowManage(true)}>MANAGE</PBtn><PBtn C={C} onClick={()=>setShowAdd(true)}>ADD SLOT</PBtn></Hdr>
        <Scroll>
          {loadingL?<Ldg C={C}/>:
            <DayGrid days={DAYS} getLessons={getLessonsForDay} C={C} onTap={l=>setShowTutors(l)}
              renderExtra={l=>acceptedMap[l.id]&&(
                <LessonTimer lesson={l} C={C}/>
              )}/>
          }
        </Scroll>
      </>}

      {tab==="archive"&&<>
        <Hdr C={C} dm={dm}><AvaBubble name={profile.name} C={C}/></Hdr>
        <Scroll>
          <ArchSearch value={archSearch} onChange={setArchSearch} C={C}/>
          <FilterRow value={archFilter} onChange={setArchFilter} C={C}/>
          {loadingN?<Ldg C={C}/>:<NoteGrid notes={filteredNotes()} C={C} onLike={id=>handleInteraction(id,"liked")} onSave={id=>handleInteraction(id,"saved")} onOpen={setOpenNote}/>}
        </Scroll>
      </>}

      {tab==="identity"&&<>
        <IdentHdr C={C} dm={dm} setDm={setDm} onLogout={onLogout}/>
        <Scroll>
          <ProfCard profile={profile} editP={editP} setEditP={setEditP} editing={profEdit} pfpRef={pfpRef} C={C}/>
          <input type="file" accept="image/*" ref={pfpRef} style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setEditP(p=>({...p,pfp_local:ev.target.result}));r.readAsDataURL(f);}}/>
          <ConfCard C={C} editP={editP} setEditP={setEditP} editing={profEdit} profile={profile} isStudent
            onToggle={()=>{if(profEdit)handleSaveProfile();else{setEditP({...profile});setProfEdit(true);}}} saving={profSaving}/>
          <div style={{height:24}}/>
        </Scroll>
      </>}

      <BotNav tab={tab} setTab={setTab} C={C}/>

      {showAdd&&<Modal onClose={()=>setShowAdd(false)} C={C}>
        <MT>📅 New Session</MT><MS C={C}>Configure the slot.</MS>
        <ML C={C}>SUBJECT</ML><Picker value={addForm.subject} onChange={v=>setAddForm(f=>({...f,subject:v}))} items={SUBJECTS} placeholder="Select Subject" C={C}/>
        <ML C={C}>DAY</ML><Picker value={addForm.day} onChange={v=>setAddForm(f=>({...f,day:v}))} items={DAYS.map((d,i)=>({label:d+" – "+DAY_FULL[i],value:d}))} placeholder="Select Day" C={C}/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          <div><ML C={C}>FROM</ML><Picker value={String(addForm.from)} onChange={v=>setAddForm(f=>({...f,from:+v}))} items={HOURS.map(h=>({label:timeLbl(h),value:String(h)}))} placeholder="From" C={C}/></div>
          <div><ML C={C}>TO</ML><Picker value={String(addForm.to)} onChange={v=>setAddForm(f=>({...f,to:+v}))} items={HOURS.map(h=>({label:timeLbl(h),value:String(h)}))} placeholder="To" C={C}/></div>
        </div>
        <ML C={C}>NOTE FOR TUTOR</ML>
        <input style={miSty(C)} placeholder="Brief note…" value={addForm.desc} onChange={e=>setAddForm(f=>({...f,desc:e.target.value}))}/>
        <ML C={C}>MODE</ML>
        <ModeRow online={addForm.online} C={C} setOnline={v=>setAddForm(f=>({...f,online:v}))}/>
        <SvBtn C={C} onClick={handleAddLesson} loading={saving}>💾 SAVE SLOT</SvBtn>
        <CnBtn C={C} onClick={()=>setShowAdd(false)}>CANCEL</CnBtn>
      </Modal>}

      {showManage&&<Modal onClose={()=>{setShowManage(false);setEditLesson(null);}} C={C}>
        {editLesson?(
          <>
            <MT>✏️ Edit Session</MT><MS C={C}>Modify details.</MS>
            <ML C={C}>SUBJECT</ML><Picker value={editLesson.subject} onChange={v=>setEditLesson(l=>({...l,subject:v}))} items={SUBJECTS} placeholder="Select" C={C}/>
            <ML C={C}>DAY</ML><Picker value={editLesson.day} onChange={v=>setEditLesson(l=>({...l,day:v}))} items={DAYS.map((d,i)=>({label:d+" – "+DAY_FULL[i],value:d}))} placeholder="Day" C={C}/>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><ML C={C}>FROM</ML><Picker value={String(editLesson.from_hour)} onChange={v=>setEditLesson(l=>({...l,from_hour:+v}))} items={HOURS.map(h=>({label:timeLbl(h),value:String(h)}))} placeholder="From" C={C}/></div>
              <div><ML C={C}>TO</ML><Picker value={String(editLesson.to_hour)} onChange={v=>setEditLesson(l=>({...l,to_hour:+v}))} items={HOURS.map(h=>({label:timeLbl(h),value:String(h)}))} placeholder="To" C={C}/></div>
            </div>
            <ML C={C}>MODE</ML><ModeRow online={editLesson.online} C={C} setOnline={v=>setEditLesson(l=>({...l,online:v}))}/>
            <SvBtn C={C} onClick={handleSaveEdit} loading={saving}>✓ SAVE</SvBtn>
            <CnBtn C={C} onClick={()=>setEditLesson(null)}>← BACK</CnBtn>
          </>
        ):(
          <>
            <MT>⚙️ Manage Slots</MT><MS C={C}>{lessons.length} lesson{lessons.length!==1?"s":""} scheduled</MS>
            {lessons.length===0&&<Empty C={C}>NO LESSONS YET</Empty>}
            {lessons.map(l=>(
              <div key={l.id} style={{background:subjBg(l.subject),borderRadius:14,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:14,color:"#111"}}>{l.subject}</div>
                  <div style={{fontSize:11,color:"#555",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginTop:2}}>{l.day} · {timeLbl(l.from_hour)}–{timeLbl(l.to_hour)}</div>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setEditLesson({...l})} style={{background:"#fff",border:"1px solid #ddd",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,color:"#111"}}>EDIT</button>
                  <button onClick={()=>handleDeleteLesson(l.id)} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,color:"#DC2626"}}>DEL</button>
                </div>
              </div>
            ))}
            <CnBtn C={C} onClick={()=>setShowManage(false)}>CLOSE</CnBtn>
          </>
        )}
      </Modal>}

      {showTutors&&<Modal onClose={()=>setShowTutors(null)} C={C}>
        <div style={{fontSize:10,fontWeight:800,letterSpacing:2,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:4}}>SUBJECT</div>
        <MT>{showTutors.subject}</MT>
        <MS C={C}>{showTutors.day} · {timeLbl(showTutors.from_hour)} – {timeLbl(showTutors.to_hour)} · {showTutors.online?"ONLINE":"OFFLINE"}</MS>
        <div style={{fontSize:10,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1,marginBottom:12}}>TUTORS FOR {studentLevel?.toUpperCase()||"YOUR LEVEL"}</div>
        {getMatchingTutors(showTutors).length===0&&<Empty C={C}>NO TUTORS FOR THIS SUBJECT & LEVEL YET</Empty>}
        {getMatchingTutors(showTutors).map(tutor=>{
          const key=tutor.id+"-"+showTutors.id;
          const done=requested.has(key);
          const rate=showTutors.online?tutor.hourly_rate_online:tutor.hourly_rate_offline;
          return(
            <div key={tutor.id} style={{background:C.surfaceAlt,borderRadius:16,padding:"14px 16px",marginBottom:10,border:"1px solid "+C.border,display:"flex",alignItems:"flex-start",justifyContent:"space-between",gap:10}}>
              <div style={{flex:1}}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:15,color:C.text}}>{tutor.name}</div>
                <div style={{fontSize:12,color:C.sub,marginTop:2}}>{tutor.age&&tutor.age+" yrs · "}{tutor.gender&&tutor.gender+" · "}{tutor.location}</div>
                {tutor.subjects_taught&&<div style={{fontSize:11,color:C.sub,marginTop:3}}>{tutor.subjects_taught.join(", ")}</div>}
                {rate&&<div style={{fontSize:14,fontWeight:800,color:"#22C55E",marginTop:4,fontFamily:"'Barlow Condensed',sans-serif"}}>KES {rate}/hr · {showTutors.online?"Online":"Offline"}</div>}
              </div>
              <button onClick={()=>handleRequestTutor(tutor,showTutors)} style={{padding:"9px 16px",borderRadius:50,cursor:"pointer",whiteSpace:"nowrap",border:"1.5px solid "+(done?"#22C55E":C.text),background:done?"#22C55E":C.accentBg,color:done?"#fff":C.accentText,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,letterSpacing:1}}>
                {done?"✓ SENT":"REQUEST"}
              </button>
            </div>
          );
        })}
        <CnBtn C={C} onClick={()=>setShowTutors(null)}>CLOSE</CnBtn>
      </Modal>}
    </Shell>
  );
}

/* ══ TUTOR APP ══ */
function TutorApp({user,onLogout}){
  const isSample=user.id&&user.id.startsWith("sample-");
  const [dm,setDm]=useState(false);
  const C=dm?dC():lC();
  const [tab,setTab]=useState("timetable");
  const [requests,setRequests]=useState(isSample?SAMPLE_LESSONS_TUTOR:[]);
  const [loadingR,setLoadingR]=useState(!isSample);
  const [showManage,setShowManage]=useState(false);
  const [showMode,setShowMode]=useState("requests"); // "requests" | "manage"
  const [showReq,setShowReq]=useState(null);
  const [reqSaving,setReqSaving]=useState(false);
  const [notes,setNotes]=useState(isSample?SAMPLE_NOTES:[]);
  const [loadingN,setLoadingN]=useState(!isSample);
  const [archFilter,setArchFilter]=useState("ALL");
  const [archSearch,setArchSearch]=useState("");
  const [interactions,setInteractions]=useState({});
  const [showPublish,setShowPublish]=useState(false);
  const [pubForm,setPubForm]=useState({title:"",subject:"",file:null,coverPreview:null,coverFile:null});
  const [publishing,setPublishing]=useState(false);
  const [profile,setProfile]=useState(user);
  const [profEdit,setProfEdit]=useState(false);
  const [editP,setEditP]=useState({...user});
  const [profSaving,setProfSaving]=useState(false);
  const [openNote,setOpenNote]=useState(null);
  const [callLesson,setCallLesson]=useState(null);
  const [cancelReq,setCancelReq]=useState(null);
  const pfpRef=useRef();
  const pdfRef=useRef();
  const coverRef=useRef();

  useEffect(()=>{
    if(isSample)return;
    (async()=>{
      setLoadingR(true);
      try{const data=await sb.get("tutor_requests","?tutor_id=eq."+user.id+"&order=created_at.desc");setRequests(data);}
      catch(e){}finally{setLoadingR(false);}
    })();
    (async()=>{
      setLoadingN(true);
      try{
        const [n,ix]=await Promise.all([sb.get("notes","?order=created_at.desc"),sb.get("note_interactions","?user_id=eq."+user.id)]);
        setNotes(n.length?n:SAMPLE_NOTES);
        const map={};ix.forEach(i=>{map[i.note_id]={liked:i.liked,saved:i.saved,id:i.id};});
        setInteractions(map);
      }catch(e){setNotes(SAMPLE_NOTES);}finally{setLoadingN(false);}
    })();
  },[isSample,user.id]);

  // Trigger call when accepted lesson starts
  useEffect(()=>{
    const booked=requests.filter(r=>r.status==="accepted");
    const interval=setInterval(()=>{
      const now=Date.now();
      booked.forEach(l=>{
        if(!l.start_ts)return;
        const diff=now-l.start_ts;
        if(diff>=0&&diff<30000&&callLesson?.id!==l.id){setCallLesson(l);}
      });
    },5000);
    return()=>clearInterval(interval);
  },[requests,callLesson]);

  const booked=requests.filter(r=>r.status==="accepted");
  const pending=requests.filter(r=>r.status==="pending");
  const getLessonsForDay=d=>booked.filter(l=>l.day===d).sort((a,b)=>a.from_hour-b.from_hour);

  async function handleRespond(reqId,status){
    if(reqSaving)return;setReqSaving(true);
    try{
      if(!isSample)await sb.patch("tutor_requests","?id=eq."+reqId,{status});
      setRequests(r=>r.map(x=>x.id===reqId?{...x,status}:x));
      setShowReq(null);if(status==="accepted")setShowManage(false);
    }catch(e){}finally{setReqSaving(false);}
  }

  async function handleCancelBooked(req,type){
    setCancelReq(null);
    if(!isSample){try{await sb.patch("tutor_requests","?id=eq."+req.id,{status:"cancelled"});}catch(e){}}
    setRequests(r=>r.map(x=>x.id===req.id?{...x,status:"cancelled"}:x));
  }

  async function handlePublish(){
    if(!pubForm.title||!pubForm.subject||publishing)return;
    setPublishing(true);
    try{
      const color=COVER_COLORS[Math.floor(Math.random()*COVER_COLORS.length)];
      const noteData={id:"local-"+Date.now(),title:pubForm.title.toUpperCase(),subject:pubForm.subject,tutor_name:profile.name,created_at:new Date().toISOString(),rating:0,cover_url:pubForm.coverPreview||null,cover_color:color,pdf_url:null};
      if(!isSample){
        const [n]=await sb.post("notes",{tutor_id:user.id,tutor_name:profile.name,title:pubForm.title.toUpperCase(),subject:pubForm.subject,cover_color:color,rating:0});
        setNotes(ns=>[{...n},...ns]);
      }else{setNotes(ns=>[noteData,...ns]);}
      setPubForm({title:"",subject:"",file:null,coverPreview:null,coverFile:null});setShowPublish(false);
    }catch(e){}finally{setPublishing(false);}
  }

  async function handleInteraction(noteId,field){
    const cur=interactions[noteId]||{liked:false,saved:false};
    const next={...cur,[field]:!cur[field]};
    setInteractions(i=>({...i,[noteId]:next}));
    if(isSample)return;
    try{
      if(cur.id){await sb.patch("note_interactions","?id=eq."+cur.id,{[field]:next[field]});}
      else{const [row]=await sb.post("note_interactions",{note_id:noteId,user_id:user.id,...next});setInteractions(i=>({...i,[noteId]:{...next,id:row.id}}));}
    }catch(e){setInteractions(i=>({...i,[noteId]:cur}));}
  }

  async function handleSaveProfile(){
    setProfSaving(true);
    try{
      if(!isSample)await sb.patch("profiles","?id=eq."+user.id,{name:editP.name,age:editP.age?+editP.age:null,gender:editP.gender,location:editP.location,curriculum_level:editP.curriculum_level,hourly_rate_online:editP.hourly_rate_online?+editP.hourly_rate_online:null,hourly_rate_offline:editP.hourly_rate_offline?+editP.hourly_rate_offline:null});
      setProfile({...profile,...editP});setProfEdit(false);
    }catch(e){}finally{setProfSaving(false);}
  }

  const filteredNotes=()=>{
    let n=notes.map(note=>({...note,...(interactions[note.id]||{liked:false,saved:false})}));
    if(archFilter==="FAVORITES")n=n.filter(x=>x.liked);
    if(archFilter==="SAVED")n=n.filter(x=>x.saved);
    if(archSearch)n=n.filter(x=>x.title?.toLowerCase().includes(archSearch.toLowerCase())||x.subject?.toLowerCase().includes(archSearch.toLowerCase()));
    return n;
  };

  return(
    <Shell C={C}>
      {openNote&&<PdfViewer note={openNote} onClose={()=>setOpenNote(null)} C={C}/>}
      {callLesson&&<CallDialog lesson={callLesson} onEnd={(reason)=>{
        if(callLesson.online||reason==="ended"||reason==="timeout"){
          setRequests(rs=>rs.filter(r=>r.id!==callLesson.id));
        }
        setCallLesson(null);
      }} C={C}/>}
      {cancelReq&&<CancelModal onCancel={t=>handleCancelBooked(cancelReq,t)} onClose={()=>setCancelReq(null)} C={C}/>}

      {tab==="timetable"&&<>
        {/* Fixed REQUEST button for tutor */}
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 20px 14px",background:C.surface,borderBottom:"1px solid "+C.border,flexShrink:0,position:"relative"}}>
          <Logo dm={dm}/>
          <div style={{display:"flex",gap:10,alignItems:"center"}}>
            {/* Fixed requests button — always visible */}
            <button onClick={()=>{setShowMode("requests");setShowManage(true);}} style={{position:"relative",padding:"9px 18px",borderRadius:50,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,letterSpacing:1.5,border:"1.5px solid "+C.border,background:"transparent",color:C.text,display:"flex",alignItems:"center",gap:6}}>
              REQUESTS
              {pending.length>0&&<span style={{background:"#EF4444",color:"#fff",borderRadius:50,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:10,minWidth:18,height:18,display:"inline-flex",alignItems:"center",justifyContent:"center",padding:"0 4px"}}>{pending.length}</span>}
            </button>
            <PBtn outline C={C} onClick={()=>{setShowMode("manage");setShowManage(true);}}>MANAGE</PBtn>
          </div>
        </div>
        <Scroll>
          {loadingR?<Ldg C={C}/>:
            <DayGrid days={DAYS} getLessons={getLessonsForDay} C={C} showStudent
              renderExtra={l=>(<LessonTimer lesson={l} C={C}/>)}/>
          }
        </Scroll>
      </>}

      {tab==="archive"&&<>
        <Hdr C={C} dm={dm}><PBtn C={C} onClick={()=>setShowPublish(true)}><span style={{fontSize:16}}>+</span> PUBLISH</PBtn></Hdr>
        <Scroll>
          <ArchSearch value={archSearch} onChange={setArchSearch} C={C}/>
          <FilterRow value={archFilter} onChange={setArchFilter} C={C}/>
          {loadingN?<Ldg C={C}/>:<NoteGrid notes={filteredNotes()} C={C} onLike={id=>handleInteraction(id,"liked")} onSave={id=>handleInteraction(id,"saved")} onOpen={setOpenNote}/>}
        </Scroll>
      </>}

      {tab==="identity"&&<>
        <IdentHdr C={C} dm={dm} setDm={setDm} onLogout={onLogout}/>
        <Scroll>
          <ProfCard profile={profile} editP={editP} setEditP={setEditP} editing={profEdit} pfpRef={pfpRef} C={C}/>
          <input type="file" accept="image/*" ref={pfpRef} style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setEditP(p=>({...p,pfp_local:ev.target.result}));r.readAsDataURL(f);}}/>
          <ConfCard C={C} editP={editP} setEditP={setEditP} editing={profEdit} profile={profile} isTutor
            onToggle={()=>{if(profEdit)handleSaveProfile();else{setEditP({...profile});setProfEdit(true);}}} saving={profSaving}/>
          <div style={{height:24}}/>
        </Scroll>
      </>}

      <BotNav tab={tab} setTab={setTab} C={C}/>

      {showManage&&<Modal onClose={()=>{setShowManage(false);setShowReq(null);}} C={C}>
        {showReq?(
          <>
            <MT>📩 Student Request</MT><MS C={C}>Review and respond.</MS>
            {[{label:"STUDENT",value:showReq.student_name},{label:"SUBJECT",value:showReq.subject},{label:"DAY",value:DAY_FULL[DAYS.indexOf(showReq.day)]||showReq.day},{label:"TIME",value:timeLbl(showReq.from_hour)+" – "+timeLbl(showReq.to_hour)},{label:"MODE",value:showReq.online?"Online":"Offline"}].map(row=>(
              <div key={row.label} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid "+C.border}}>
                <span style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif"}}>{row.label}</span>
                <span style={{fontSize:14,fontWeight:700,color:C.text,fontFamily:"'Barlow Condensed',sans-serif"}}>{row.value}</span>
              </div>
            ))}
            {showReq.description&&(
              <div style={{marginTop:14,padding:14,borderRadius:12,background:C.surfaceAlt,border:"1px solid "+C.border}}>
                <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:6}}>STUDENT'S NOTE</div>
                <div style={{fontSize:13,color:C.text,lineHeight:1.6,fontStyle:"italic"}}>"{showReq.description}"</div>
              </div>
            )}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginTop:16}}>
              <button onClick={()=>handleRespond(showReq.id,"accepted")} style={{flex:1,padding:"14px",borderRadius:50,border:"none",background:"#22C55E",color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:13,cursor:"pointer"}}>{reqSaving?"…":"✓ ACCEPT"}</button>
              <button onClick={()=>handleRespond(showReq.id,"declined")} style={{flex:1,padding:"14px",borderRadius:50,border:"none",background:"#EF4444",color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:13,cursor:"pointer"}}>{reqSaving?"…":"✕ DECLINE"}</button>
            </div>
            <CnBtn C={C} onClick={()=>setShowReq(null)}>← BACK</CnBtn>
          </>
        ):showMode==="requests"?(
          <>
            <MT>📬 Requests</MT><MS C={C}>{pending.length} pending request{pending.length!==1?"s":""}</MS>
            {pending.length===0&&<Empty C={C}>NO PENDING REQUESTS</Empty>}
            {pending.map((r)=>(
              <div key={r.id} onClick={()=>setShowReq(r)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 14px",borderRadius:14,background:C.surfaceAlt,border:"1px solid "+C.border,marginBottom:10,cursor:"pointer"}}>
                <div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:14,color:C.text}}>{r.subject}</div>
                  <div style={{fontSize:11,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginTop:2}}>{r.student_name} · {r.day} {timeLbl(r.from_hour)}–{timeLbl(r.to_hour)}</div>
                </div>
                <span style={{color:C.sub,fontSize:18}}>›</span>
              </div>
            ))}
            <CnBtn C={C} onClick={()=>setShowManage(false)}>CLOSE</CnBtn>
          </>
        ):(
          <>
            <MT>⚙️ Manage</MT><MS C={C}>{booked.length} booked session{booked.length!==1?"s":""}</MS>
            {booked.length===0&&<Empty C={C}>NO BOOKED SESSIONS YET</Empty>}
            {booked.map(l=>(
              <div key={l.id} style={{background:subjBg(l.subject),borderRadius:14,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div>
                  <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:14,color:"#111"}}>{l.subject}</div>
                  <div style={{fontSize:11,color:"#555",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginTop:2}}>{l.day} · {timeLbl(l.from_hour)}–{timeLbl(l.to_hour)} · {l.student_name}</div>
                </div>
                <button onClick={()=>setCancelReq(l)} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"6px 12px",cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,color:"#DC2626"}}>CANCEL</button>
              </div>
            ))}
            <CnBtn C={C} onClick={()=>setShowManage(false)}>CLOSE</CnBtn>
          </>
        )}
      </Modal>}

      {showPublish&&<Modal onClose={()=>setShowPublish(false)} C={C}>
        <MT>📤 Publish Material</MT><MS C={C}>Share study resources with students.</MS>
        <ML C={C}>COVER IMAGE</ML>
        <div onClick={()=>coverRef.current.click()} style={{height:140,borderRadius:14,border:"2px dashed "+C.border,marginBottom:14,overflow:"hidden",cursor:"pointer",background:pubForm.coverPreview?"transparent":C.surfaceAlt,display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
          {pubForm.coverPreview?<img src={pubForm.coverPreview} alt="cover" style={{width:"100%",height:"100%",objectFit:"cover"}}/>:
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,color:C.sub}}><span style={{fontSize:28}}>🖼️</span><span style={{fontSize:11,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1}}>TAP TO ADD COVER</span></div>}
          {pubForm.coverPreview&&<div style={{position:"absolute",bottom:8,right:8,background:"rgba(0,0,0,.5)",borderRadius:8,padding:"4px 10px",fontSize:10,color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>CHANGE</div>}
        </div>
        <input type="file" accept="image/*" ref={coverRef} style={{display:"none"}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setPubForm(p=>({...p,coverPreview:ev.target.result,coverFile:f}));r.readAsDataURL(f);}}/>
        <ML C={C}>TITLE</ML>
        <input style={miSty(C)} placeholder="e.g. Algebra Chapter 3" value={pubForm.title} onChange={e=>setPubForm(f=>({...f,title:e.target.value}))}/>
        <ML C={C}>SUBJECT</ML>
        <Picker value={pubForm.subject} onChange={v=>setPubForm(f=>({...f,subject:v}))} items={SUBJECTS} placeholder="Select Subject" C={C}/>
        <ML C={C}>PDF FILE</ML>
        <div onClick={()=>pdfRef.current.click()} style={{border:"2px dashed "+(pubForm.file?"#22C55E":C.border),borderRadius:14,padding:18,textAlign:"center",cursor:"pointer",marginBottom:14,background:pubForm.file?"#F0FDF4":C.surfaceAlt}}>
          {pubForm.file?<div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:4}}><span style={{fontSize:24}}>📄</span><span style={{fontSize:12,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,color:"#15803d"}}>{pubForm.file.name}</span><span style={{fontSize:10,color:"#15803d",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>TAP TO CHANGE</span></div>:
            <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:6,color:C.sub}}><span style={{fontSize:28}}>📎</span><span style={{fontSize:11,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1}}>TAP TO ATTACH PDF</span></div>}
        </div>
        <input type="file" accept=".pdf" ref={pdfRef} style={{display:"none"}} onChange={e=>setPubForm(f=>({...f,file:e.target.files[0]}))}/>
        <SvBtn C={C} onClick={handlePublish} loading={publishing}>📤 PUBLISH</SvBtn>
        <CnBtn C={C} onClick={()=>setShowPublish(false)}>CANCEL</CnBtn>
      </Modal>}
    </Shell>
  );
}

/* ══ SHARED COMPONENTS ══ */
function Shell({C,children}){return <div style={{fontFamily:"Barlow,sans-serif",background:C.bg,color:C.text,height:"100vh",maxWidth:430,margin:"0 auto",display:"flex",flexDirection:"column",overflow:"hidden",position:"relative"}}>{children}</div>;}
function Scroll({children}){return <div style={{flex:1,overflowY:"auto",paddingBottom:72}}>{children}</div>;}
function Hdr({C,dm,children}){return(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"18px 20px 14px",background:C.surface,borderBottom:"1px solid "+C.border,flexShrink:0}}><Logo dm={dm}/><div style={{display:"flex",gap:10,alignItems:"center"}}>{children}</div></div>);}
function IdentHdr({C,dm,setDm,onLogout}){return(<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 20px 10px",background:C.surface,borderBottom:"1px solid "+C.border,flexShrink:0}}><Logo dm={dm}/><div style={{display:"flex",gap:10}}><button onClick={()=>setDm(d=>!d)} style={{width:40,height:40,borderRadius:12,border:"1.5px solid "+C.border,background:C.surface,fontSize:18,cursor:"pointer"}}>{dm?"☀️":"🌙"}</button><button onClick={onLogout} style={{width:40,height:40,borderRadius:12,border:"1.5px solid "+C.border,background:C.surface,fontSize:15,cursor:"pointer",color:"#EF4444"}}>↪</button></div></div>);}
function PBtn({C,children,onClick,outline}){return <button onClick={onClick} style={{padding:"9px 20px",borderRadius:50,cursor:"pointer",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,letterSpacing:1.5,display:"flex",alignItems:"center",gap:6,border:outline?"1.5px solid "+C.border:"none",background:outline?"transparent":C.accentBg,color:outline?C.text:C.accentText}}>{children}</button>;}
function AvaBubble({name,C}){return <div style={{width:36,height:36,borderRadius:"50%",background:C.accentBg,display:"flex",alignItems:"center",justifyContent:"center",color:C.accentText,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:14}}>{name?name[0].toUpperCase():"?"}</div>;}
function Ldg({C}){return <div style={{display:"flex",alignItems:"center",justifyContent:"center",padding:"48px 0",color:C.sub,fontSize:13,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1,fontWeight:700}}>LOADING…</div>;}
function Empty({C,children}){return <div style={{textAlign:"center",padding:"24px 0",color:C.sub,fontSize:13,fontFamily:"'Barlow Condensed',sans-serif",letterSpacing:1}}>{children}</div>;}

function DayGrid({days,getLessons,C,onTap,showStudent,renderExtra}){
  return(
    <div style={{background:C.surface,margin:"14px 14px 0",borderRadius:20,overflow:"hidden",border:"1px solid "+C.border}}>
      {days.map((day,idx)=>{
        const dl=getLessons(day);
        return(
          <div key={day} style={{display:"flex",borderBottom:idx<days.length-1?"1px solid "+C.border:"none",minHeight:76}}>
            <div style={{width:60,padding:"16px 0 16px 18px",flexShrink:0}}><span style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,letterSpacing:1.5,color:C.sub}}>{day}</span></div>
            <div style={{flex:1,padding:"10px 12px 10px 8px",display:"flex",flexDirection:"column",gap:6}}>
              {dl.length===0?<span style={{fontSize:11,color:C.border,letterSpacing:1,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,paddingTop:4}}>NO PLANS</span>:
                dl.map(l=>(
                  <div key={l.id} onClick={()=>onTap&&onTap(l)} style={{borderRadius:10,padding:"8px 12px",background:subjBg(l.subject),border:"1px solid rgba(0,0,0,.06)",cursor:onTap?"pointer":"default",display:"flex",flexDirection:"column",gap:2}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#555",fontFamily:"'Barlow Condensed',sans-serif"}}>{timeLbl(l.from_hour)} – {timeLbl(l.to_hour)}</div>
                    <div style={{fontSize:13,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif",color:"#111"}}>{l.subject}</div>
                    {showStudent&&l.student_name&&<div style={{fontSize:11,color:"#555",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>👤 {l.student_name}</div>}
                    <span style={{fontSize:9,fontWeight:700,padding:"2px 8px",borderRadius:20,display:"inline-block",fontFamily:"'Barlow Condensed',sans-serif",background:l.online?"#DBEAFE":"#DCF5E4",color:l.online?"#1d4ed8":"#166634",width:"fit-content"}}>{l.online?"ONLINE":"OFFLINE"}</span>
                    {renderExtra&&renderExtra(l)}
                  </div>
                ))
              }
            </div>
          </div>
        );
      })}
    </div>
  );
}

function ArchSearch({value,onChange,C}){return(<div style={{margin:"14px 14px 10px",position:"relative"}}><span style={{position:"absolute",left:16,top:"50%",transform:"translateY(-50%)",fontSize:16,color:C.sub}}>🔍</span><input value={value} onChange={e=>onChange(e.target.value)} placeholder="Search collective database…" style={{width:"100%",padding:"13px 16px 13px 44px",borderRadius:50,border:"1.5px solid "+C.border,background:C.surface,color:C.text,fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"Barlow,sans-serif"}}/></div>);}
function FilterRow({value,onChange,C}){return(<div style={{display:"flex",margin:"0 14px 14px",background:C.surface,borderRadius:50,padding:4,border:"1px solid "+C.border}}>{["ALL","FAVORITES","SAVED"].map(f=><button key={f} onClick={()=>onChange(f)} style={{flex:1,padding:"8px 0",borderRadius:50,border:"none",cursor:"pointer",background:value===f?C.accentBg:"transparent",color:value===f?C.accentText:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:11,letterSpacing:1.5}}>{f}</button>)}</div>);}

function NoteGrid({notes,C,onLike,onSave,onOpen}){
  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,padding:"0 14px"}}>
      {notes.length===0&&<div style={{gridColumn:"1/-1",textAlign:"center",padding:"32px 0",color:C.sub,fontSize:13,fontFamily:"'Barlow Condensed',sans-serif"}}>NO MATERIALS YET</div>}
      {notes.map(note=>(
        <div key={note.id} style={{background:C.surface,borderRadius:18,overflow:"hidden",border:"1px solid "+C.border,cursor:"pointer"}} onClick={()=>onOpen&&onOpen(note)}>
          <div style={{height:140,position:"relative",background:note.cover_color||"#eee"}}>
            {note.cover_url?<img src={note.cover_url} alt="" style={{width:"100%",height:"100%",objectFit:"cover"}} onError={e=>e.target.style.display="none"}/>:
              <div style={{width:"100%",height:"100%",background:note.cover_color||"#eee",display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{fontSize:32,opacity:.35}}>📄</span></div>}
            {note.rating>0&&<div style={{position:"absolute",top:10,left:10,background:"rgba(255,255,255,.92)",borderRadius:50,padding:"3px 10px",fontSize:12,fontWeight:800,fontFamily:"'Barlow Condensed',sans-serif",color:"#111"}}>{note.rating}★</div>}
            <div style={{position:"absolute",bottom:10,right:10,display:"flex",gap:6}}>
              {[{act:()=>onLike(note.id),on:note.liked,a:"❤️",b:"🤍"},{act:()=>onSave(note.id),on:note.saved,a:"🔖",b:"🏷️"}].map((btn,i)=>(
                <button key={i} onClick={e=>{e.stopPropagation();btn.act();}} style={{width:34,height:34,borderRadius:"50%",background:"rgba(255,255,255,.92)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15}}>{btn.on?btn.a:btn.b}</button>
              ))}
            </div>
          </div>
          <div style={{padding:"10px 12px 12px"}}>
            <div style={{fontSize:9,fontWeight:800,letterSpacing:1.5,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:4,display:"inline-block",border:"1px solid "+C.border,borderRadius:4,padding:"1px 6px"}}>{note.subject?.toUpperCase()}</div>
            <div style={{fontSize:12,fontWeight:900,fontFamily:"'Barlow Condensed',sans-serif",color:C.text,marginBottom:2,lineHeight:1.2}}>{note.title}</div>
            <div style={{fontSize:10,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700}}>TUTOR: {note.tutor_name?.toUpperCase()}</div>
            <div style={{fontSize:9,color:"#4f46e5",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,marginTop:4}}>TAP TO OPEN PDF →</div>
          </div>
        </div>
      ))}
    </div>
  );
}

function ProfCard({profile,editP,setEditP,editing,pfpRef,C}){

    <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:24,margin:"0 14px 16px",padding:"28px 20px 20px",display:"flex",flexDirection:"column",alignItems:"center",gap:10}}>
      <div onClick={()=>editing&&pfpRef.current.click()} style={{width:96,height:96,borderRadius:"50%",background:C.surfaceAlt,border:"2px solid "+C.border,overflow:"hidden",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",cursor:editing?"pointer":"default"}}>

      </div>

      <div style={{fontSize:12,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,letterSpacing:1}}>{[profile.age&&profile.age+" YRS",profile.grade||profile.curriculum_level].filter(Boolean).join(" • ")||"—"}</div>

function ConfCard({C,editP,setEditP,editing,profile,onToggle,isStudent,isTutor,saving}){
  const sF=[{label:"CALLSIGN",key:"name",icon:"👤",type:"text",ph:"Full Name"},{label:"ZONE",key:"location",icon:"📍",type:"text",ph:"City, Region"},{label:"AGE",key:"age",icon:"🎂",type:"number",ph:"Years"},{label:"GENDER",key:"gender",icon:"⚧",items:GENDERS},{label:"ACADEMIC GRADE",key:"grade",icon:"🎓",items:STUDENT_GRADES}];
  const tF=[{label:"CALLSIGN",key:"name",icon:"👤",type:"text",ph:"Full Name"},{label:"ZONE",key:"location",icon:"📍",type:"text",ph:"City, Region"},{label:"AGE",key:"age",icon:"🎂",type:"number",ph:"Years"},{label:"GENDER",key:"gender",icon:"⚧",items:GENDERS},{label:"CURRICULUM LEVEL",key:"curriculum_level",icon:"🎓",items:LEVELS},{label:"ONLINE RATE (KES/HR)",key:"hourly_rate_online",icon:"🌐",type:"number",ph:"e.g. 900"},{label:"OFFLINE RATE (KES/HR)",key:"hourly_rate_offline",icon:"📍",type:"number",ph:"e.g. 700"}];

      <div style={{fontSize:10,color:C.sub,textAlign:"center",letterSpacing:1.5,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,marginBottom:20}}>ADJUST YOUR IDENTITY DETAILS.</div>
      {fields.map(f=>(
        <div key={f.key} style={{marginBottom:16}}>
          <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:C.sub,fontFamily:"'Barlow Condensed',sans-serif",marginBottom:8,display:"flex",alignItems:"center",gap:6,textTransform:"uppercase"}}>{f.icon} {f.label}</div>
          {editing?f.items?<Picker value={editP[f.key]||""} onChange={v=>setEditP(p=>({...p,[f.key]:v}))} items={f.items} placeholder="Choose…" C={C}/>:<input type={f.type} placeholder={f.ph} value={editP[f.key]||""} onChange={e=>setEditP(p=>({...p,[f.key]:e.target.value}))} style={{width:"100%",background:"transparent",border:"none",borderBottom:"1px solid "+C.text,padding:"8px 0",fontSize:15,color:C.text,fontFamily:"Barlow,sans-serif",outline:"none"}}/>:
            <div style={{borderBottom:"1px solid "+C.border,padding:"8px 0",fontSize:15,color:C.text,fontFamily:"Barlow,sans-serif",display:"flex",alignItems:"center",gap:10}}><span style={{color:C.sub,fontSize:14}}>{f.icon}</span><span>{profile[f.key]||"—"}</span></div>}
        </div>
      ))}
      <button onClick={onToggle} style={{width:"100%",padding:"15px",borderRadius:50,border:"none",background:C.accentBg,color:C.accentText,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:14,letterSpacing:2,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:16}}>
        {saving?"SAVING…":editing?"✓  SAVE IDENTITY":"✏  EDIT IDENTITY"}
      </button>
    </div>
  );
}

function BotNav({tab,setTab,C}){
  const tabs=[{id:"timetable",label:"TIMETABLE",icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},{id:"archive",label:"ARCHIVE",icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>},{id:"identity",label:"IDENTITY",icon:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>}];
  return(
    <div style={{position:"absolute",bottom:0,left:0,right:0,background:C.surface,borderTop:"1px solid "+C.border,borderRadius:"20px 20px 0 0",display:"flex",padding:"6px 0 10px"}}>
      {tabs.map(n=><button key={n.id} onClick={()=>setTab(n.id)} style={{flex:1,border:"none",background:"transparent",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:4,padding:"8px 0",color:tab===n.id?C.text:C.sub,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:10,letterSpacing:1.5}}>{n.icon}{n.label}</button>)}
    </div>
  );
}
function Modal({children,onClose,C}){return(<div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:200,display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={e=>{if(e.target===e.currentTarget)onClose();}}><div style={{background:C.surface,borderRadius:"24px 24px 0 0",width:"100%",maxWidth:430,padding:"24px 22px 36px",maxHeight:"88vh",overflowY:"auto"}}>{children}</div></div>);}
function MT({children}){return <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontWeight:900,fontSize:22,letterSpacing:1,marginBottom:4,display:"flex",alignItems:"center",gap:8}}>{children}</div>;}
function MS({children,C}){return <div style={{fontSize:13,color:C.sub,marginBottom:20}}>{children}</div>;}
function ML({children,C}){return <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:C.sub,marginBottom:6,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif"}}>{children}</div>;}
function SvBtn({C,children,onClick,loading}){return <button onClick={onClick} disabled={loading} style={{width:"100%",padding:"15px",borderRadius:50,border:"none",background:C.accentBg,color:C.accentText,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:14,letterSpacing:2,cursor:loading?"not-allowed":"pointer",opacity:loading?.7:1,display:"flex",alignItems:"center",justifyContent:"center",gap:8,marginTop:4}}>{loading?"SAVING…":children}</button>;}
function CnBtn({C,children,onClick}){return <button onClick={onClick} style={{width:"100%",padding:"14px",borderRadius:50,border:"1.5px solid "+C.border,background:"transparent",color:C.text,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:700,fontSize:13,letterSpacing:1,cursor:"pointer",marginTop:10}}>{children}</button>;}
function ModeRow({online,setOnline,C}){return(<div style={{display:"flex",gap:10,marginBottom:14}}>{[["📍 OFFLINE",false],["🌐 ONLINE",true]].map(([lbl,val])=><button key={lbl} onClick={()=>setOnline(val)} style={{flex:1,padding:"11px",borderRadius:12,border:"1.5px solid "+(online===val?C.text:C.border),background:online===val?C.accentBg:"transparent",color:online===val?C.accentText:C.text,fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:12,cursor:"pointer"}}>{lbl}</button>)}</div>);}
function FL({children}){return <div style={{fontSize:10,fontWeight:800,letterSpacing:1.5,color:"#888",marginBottom:6,textTransform:"uppercase",fontFamily:"'Barlow Condensed',sans-serif",marginTop:4}}>{children}</div>;}
function FI({C,placeholder,value,onChange,type="text"}){return <input type={type} placeholder={placeholder} value={value} onChange={onChange} style={{width:"100%",padding:"13px 16px",borderRadius:14,border:"1.5px solid "+C.border,background:C.surfaceAlt,color:C.text,fontSize:14,outline:"none",boxSizing:"border-box",fontFamily:"Barlow,sans-serif",marginBottom:14}}/>;}
function JoinBtn({onClick,disabled,loading}){return <button onClick={onClick} disabled={disabled} style={{width:"100%",padding:"16px",borderRadius:50,border:"none",background:disabled?"#AAA":"#111",color:"#fff",fontFamily:"'Barlow Condensed',sans-serif",fontWeight:800,fontSize:15,letterSpacing:2,cursor:disabled?"not-allowed":"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginTop:8}}>{loading?"JOINING…":"JOIN NETWORK"}{!loading&&<span style={{fontSize:16}}>→</span>}</button>;}
function miSty(C){return{width:"100%",padding:"13px 16px",borderRadius:14,border:"1.5px solid "+C.border,background:C.surfaceAlt,color:C.text,fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:14,fontFamily:"Barlow,sans-serif"};}

const root=ReactDOM.createRoot(document.getElementById("root"));
root.render(<AppRoot/>);
</script>
</body>
</html>
